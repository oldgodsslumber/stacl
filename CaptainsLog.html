    return `<tr onclick="saveCharField('_selectedTrack','${escQ(t.name)}');renderCurrentTab()">
      <td><strong${sel?' style="color:var(--accent)"':''}>${t.name}</strong></td>
      <td style="color:var(--muted);font-size:10px">${t.disBonus}</td>
      <td style="color:var(--muted);font-size:10px">${t.focus}</td>
    </tr>`;
  }).join('');
  let eventRows = CAREER_EVENTS.map(e=>{
    const sel = c.careerEvent === e.name;
    return `<tr onclick="selectCareerEvent('${escQ(e.name)}')" class="${sel?'selected':''}">
      <td style="color:var(--muted)">${e.d}</td>
      <td><strong${sel?' style="color:var(--accent)"':''}>${e.name}</strong><br><span style="color:var(--muted)">${e.desc}</span></td>
    </tr>`;
  }).join('');

  let trackPicker = '';
  const tr = ACADEMY_TRACKS.find(t => t.name === c._selectedTrack);
  if (tr) {
    trackPicker = `<div style="background:var(--surface2);border:1px solid var(--border);border-radius:4px;padding:8px;margin-bottom:10px">
      <div style="font-size:10px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:6px">Track Bonuses — ${escH(tr.name)}</div>`;
    const fixed = Object.entries(tr._disc||{});
    if (fixed.length > 0) {
      trackPicker += `<div style="font-size:11px;color:var(--muted);margin-bottom:6px">Auto-applied: ${fixed.map(([k,v])=>`<strong style="color:var(--accent)">${k} +${v}</strong>`).join(', ')}</div>`;
    }
    if (tr._discFreeMode === 'allied') {
      for (let i = 0; i < 2; i++) {
        const chosen = (lp.trackDiscFree2||[])[i];
        trackPicker += `<div style="font-size:11px;display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:6px">
          <span style="color:var(--muted);min-width:120px">Discipline +2 (${i+1}/2):</span>`;
        DISCIPLINES.forEach(d => {
          const other = (lp.trackDiscFree2||[]).filter((_,j)=>j!==i)[0];
          const disabled = other === d.key;
          trackPicker += `<button class="btn btn-xs${chosen===d.key?' btn-accent':''}${disabled?' btn-danger':''}" onclick="setLPTrackDiscFree2('${d.key}',${i})">${d.abbr}</button>`;
        });
        if (!chosen) trackPicker += `<span style="color:var(--danger);font-size:10px">← choose one</span>`;
        trackPicker += `</div>`;
      }
      const chosen1 = lp.trackDiscFree1;
      trackPicker += `<div style="font-size:11px;display:flex;align-items:center;gap:6px;flex-wrap:wrap">
        <span style="color:var(--muted);min-width:120px">Discipline +1:</span>`;
      DISCIPLINES.forEach(d => {
        trackPicker += `<button class="btn btn-xs${chosen1===d.key?' btn-accent':''}" onclick="setLPTrackDiscFree1('${d.key}')">${d.abbr}</button>`;
      });
      if (!chosen1) trackPicker += `<span style="color:var(--danger);font-size:10px">← choose one</span>`;
      trackPicker += `</div>`;
    } else if (tr._discFreeMode === 'diplomatic') {
      for (let i = 0; i < (tr._discFree||0); i++) {
        const chosen = (lp.trackDiscFree||[])[i];
        trackPicker += `<div style="font-size:11px;display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:6px">
          <span style="color:var(--muted);min-width:120px">Free Disc +1 (${i+1}/${tr._discFree}):</span>`;
        DISCIPLINES.forEach(d => {
          const alreadyFixed = (tr._disc||{})[d.key];
          trackPicker += `<button class="btn btn-xs${chosen===d.key?' btn-accent':''}" onclick="setLPTrackDiscFree('${d.key}',${i})">${d.abbr}</button>`;
        });
        if (!chosen) trackPicker += `<span style="color:var(--danger);font-size:10px">← choose one</span>`;
        trackPicker += `</div>`;
      }
    }
    // Focus input for this track
    trackPicker += `<div style="font-size:11px;color:var(--muted);margin-top:8px;margin-bottom:4px">Track Focus suggestion: <em>${escH(tr.focus)}</em></div>
      <div style="display:flex;gap:6px">
        <input id="focus-in" placeholder="Enter track focus…" style="flex:1;background:var(--surface3);border:1px solid var(--border);color:var(--text);padding:4px 8px;border-radius:3px;font-size:12px">
        <button class="btn btn-sm btn-accent" onclick="addFocus()">ADD FOCUS</button>
      </div>`;
    if ((c.focuses||[]).length > 0) {
      trackPicker += `<div style="font-size:10px;color:var(--muted);margin-top:6px">Focuses so far: ${(c.focuses).map(f=>`<strong>${escH(f)}</strong>`).join(', ')}</div>`;
    }
    trackPicker += `</div>`;
  }

  return `
  <p style="font-size:11px;color:var(--muted);margin-bottom:8px">Choose your Academy track, assign discipline bonuses, add your track focus, then pick a Career Event.</p>
  ${c._selectedTrack?`<div style="color:var(--accent);font-size:12px;margin-bottom:6px">Track: <strong>${escH(c._selectedTrack)}</strong></div>`:''}
  <div style="font-size:10px;color:var(--muted);letter-spacing:1px;margin-bottom:4px">Academy Track</div>
  <table class="roll-table" style="margin-bottom:6px">
    <thead><tr><th>Track</th><th>Discipline Bonuses</th><th>Focus Suggestion</th></tr></thead>
    <tbody>${trackRows}</tbody>
  </table>
  ${trackPicker}
  <div style="display:flex;gap:6px;align-items:center;margin-bottom:6px;flex-wrap:wrap">
    <div style="font-size:10px;color:var(--muted);letter-spacing:1px;text-transform:uppercase">Career Event</div>
    <button class="btn btn-accent btn-sm" onclick="rollCareerEvent()">Roll d20</button>
    ${c.careerEvent?`<span style="color:var(--accent);font-size:11px"><strong>${escH(c.careerEvent)}</strong></span>`:''}
  </div>
  <div style="max-height:200px;overflow-y:auto">
    <table class="roll-table">
      <thead><tr><th>d20</th><th>Event</th></tr></thead>
      <tbody>${eventRows}</tbody>
    </table>
  </div>
  ${c.careerEvent ? `<div style="background:var(--surface2);border:1px solid var(--border);border-radius:4px;padding:8px;margin-top:8px">
    <div style="font-size:10px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:6px">Career Event Focus</div>
    <div style="font-size:11px;color:var(--muted);margin-bottom:6px">If your career event grants a focus, add it here.</div>
    <div style="display:flex;gap:6px">
      <input id="focus-event-in" placeholder="Enter career event focus…" style="flex:1;background:var(--surface3);border:1px solid var(--border);color:var(--text);padding:4px 8px;border-radius:3px;font-size:12px">
      <button class="btn btn-sm btn-accent" onclick="addFocusFrom('focus-event-in')">ADD FOCUS</button>
    </div>
    ${(c.focuses||[]).length > 0 ? `<div style="font-size:10px;color:var(--muted);margin-top:5px">Focuses so far: ${(c.focuses).map(f=>`<strong>${escH(f)}</strong>`).join(', ')}</div>` : ''}
  </div>` : ''}`;
}

function renderCS3() {
  const c = S.char;
  const base = 7; const pool = 14;
  const lpA = lpAttrBonuses();
  const current = ATTRIBUTES.reduce((s,a)=>s+(c[a.key]-base),0);
  const remaining = pool - current;
  const lpTotal = Object.values(lpA).reduce((s,v)=>s+v,0);
  let lpSummary = '';
  if (lpTotal > 0) {
    const parts = ATTRIBUTES.filter(a=>lpA[a.key]>0).map(a=>`${a.abbr} +${lpA[a.key]}`);
    lpSummary = `<div style="font-size:11px;padding:6px 10px;background:var(--surface2);border:1px solid var(--border);border-radius:4px;margin-bottom:8px;color:var(--muted)">
      Lifepath bonuses (applied on finish): <strong style="color:var(--accent)">${parts.join(', ')}</strong></div>`;
  } else {
    lpSummary = `<div style="font-size:11px;color:var(--muted);margin-bottom:8px">No lifepath attribute bonuses selected yet. Return to earlier steps to assign them.</div>`;
  }
  let attrHTML = '<div class="attr-grid">';
  ATTRIBUTES.forEach(a => {
    const lpB = lpA[a.key]||0;
    const finalVal = c[a.key] + lpB;
    const overMax = finalVal > 12;
    attrHTML += `<div class="attr-box">
      <div class="attr-abbr">${a.abbr}</div>
      <div class="attr-val">${c[a.key]}</div>
      ${lpB>0?`<div style="font-size:9px;color:var(--accent)">+${lpB} lp</div><div style="font-size:10px;color:${overMax?'var(--danger)':'var(--muted)'}">= ${finalVal}${overMax?' ⚠':''}  </div>`:''}
      <div style="display:flex;gap:4px;justify-content:center;margin-top:2px">
        <button class="res-btn" onclick="creationAdjAttr('${a.key}',-1)">-</button>
        <button class="res-btn" onclick="creationAdjAttr('${a.key}',1)">+</button>
      </div>
      <div class="attr-full">${a.full}</div>
    </div>`;
  });
  attrHTML += '</div>';
  return `
  <p style="font-size:11px;color:var(--muted);margin-bottom:8px">Each attribute starts at 7. Distribute <strong>14</strong> additional points. Max 12 in any attribute. Lifepath bonuses are added on finish.</p>
  <div style="font-size:13px;padding:8px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:4px;margin-bottom:8px">
    Free points remaining: <strong style="color:${remaining<0?'var(--danger)':remaining===0?'var(--success)':'var(--text)'}">${remaining}</strong>
    ${remaining<0?'<span style="color:var(--danger);margin-left:8px">Too many points!</span>':''}
  </div>
  ${lpSummary}
  ${attrHTML}`;
}

function renderCS4() {
  const c = S.char;
  const base = 1; const pool = 10;
  const lpD = lpDiscBonuses();
  const current = DISCIPLINES.reduce((s,d)=>s+(c[d.key]-base),0);
  const remaining = pool - current;
  const lpTotal = Object.values(lpD).reduce((s,v)=>s+v,0);
  let lpSummary = '';
  if (lpTotal > 0) {
    const parts = DISCIPLINES.filter(d=>lpD[d.key]>0).map(d=>`${d.abbr} +${lpD[d.key]}`);
    lpSummary = `<div style="font-size:11px;padding:6px 10px;background:var(--surface2);border:1px solid var(--border);border-radius:4px;margin-bottom:8px;color:var(--muted)">
      Lifepath bonuses (applied on finish): <strong style="color:var(--accent)">${parts.join(', ')}</strong></div>`;
  }
  let discHTML = '<div class="disc-grid">';
  DISCIPLINES.forEach(d=>{
    const rank=c[d.key]||1;
    const lpB=lpD[d.key]||0;
    const finalRank=rank+lpB;
    let dots='<div class="disc-dots">';
    for(let i=1;i<=5;i++) dots+=`<div class="dot${i<=rank?' filled':''}" onclick="creationSetDisc('${d.key}',${i})" ondblclick="creationSetDisc('${d.key}',1)"></div>`;
    dots+='</div>';
    discHTML+=`<div class="disc-row">
      <span style="font-size:9px;color:var(--muted);min-width:28px">${d.abbr}</span>
      <span class="disc-name">${d.full}</span>
      ${dots}
      <span style="font-size:11px;color:var(--accent);min-width:16px">${rank}</span>
      ${lpB>0?`<span style="font-size:10px;color:var(--muted)">+${lpB} lp = ${finalRank}</span>`:''}
    </div>`;
  });
  discHTML+='</div>';
  return `
  <p style="font-size:11px;color:var(--muted);margin-bottom:8px">Disciplines start at 1. Distribute <strong>10</strong> additional points. Max 5 in any discipline. Lifepath bonuses are added on finish.</p>
  <div style="font-size:13px;padding:8px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:4px;margin-bottom:8px">
    Free points remaining: <strong style="color:${remaining<0?'var(--danger)':remaining===0?'var(--success)':'var(--text)'}">${remaining}</strong>
    ${remaining<0?'<span style="color:var(--danger);margin-left:8px">Too many points!</span>':''}
  </div>
  ${lpSummary}
  ${discHTML}`;
}

function renderCS7() {
  const c = S.char;
  const sh = S.ship;
  const mode = window._csShipMode || 'era';
  const charEra = c._selectedEra || c.era || '';

  // Match ship classes to character's era via direct lookup
  const shipEraKey = charEra ? ERA_TO_SHIP_ERA[charEra] : null;
  const eraShips = shipEraKey ? SHIP_CLASSES.filter(sc => sc.era === shipEraKey) : [];
  const displayShips = mode === 'all' ? SHIP_CLASSES : (eraShips.length ? eraShips : (charEra ? [] : SHIP_CLASSES));
  const eraLabel = charEra ? charEra.replace(/\s*\(.*?\)\s*/g,'').trim() : 'Era Ships';

  const classRows = displayShips.length ? displayShips.map(sc => {
    const isSel = sh.className === sc.name && sh.era === sc.era;
    const isPrev = window._shipClassPreview === sc.name;
    const rowBg = isPrev ? 'background:rgba(255,153,0,0.22)' : (isSel ? 'background:var(--accent-glow)' : '');
    return `<tr onclick="previewShipClass('${escQ(sc.name)}')" style="cursor:pointer;${rowBg}">
      <td style="color:${(isSel||isPrev)?'var(--accent)':'var(--text)'};font-weight:bold;padding:5px 8px">${escH(sc.name)}${isSel?' ✓':''}${isPrev?' ▼':''}</td>
      <td style="color:var(--muted);font-size:10px;padding:5px 8px">${escH(sc.era)}</td>
      <td style="text-align:center;padding:5px 8px">${sc.scale}</td>
      <td style="font-size:10px;padding:5px 8px;color:var(--muted)">${sc.comms}/${sc.computers}/${sc.engines}/${sc.sensors}/${sc.structure}/${sc.weapons}</td>
    </tr>`;
  }).join('') : `<tr><td colspan="4" style="padding:12px 8px;color:var(--muted);font-size:11px;font-style:italic">${charEra ? 'No ships in library for this era — try All Classes.' : 'Select an era in an earlier step to filter ships.'}</td></tr>`;

  const selectedBadge = (sh.className || sh.name) ? `<div style="background:var(--surface2);border:1px solid var(--accent);border-radius:4px;padding:8px 12px;margin-bottom:10px;display:flex;align-items:center;gap:10px;flex-wrap:wrap">
    <div>
      <div style="color:var(--accent);font-size:12px;font-weight:bold">${escH(sh.className||sh.name)}</div>
      <div style="font-size:10px;color:var(--muted)">${sh.era?escH(sh.era)+' · ':''}Scale ${sh.scale}</div>
    </div>
    ${sh.name?`<div style="font-size:12px"><strong>${escH(sh.name)}</strong>${sh.registry?' <span style="color:var(--muted)">'+escH(sh.registry)+'</span>':''}</div>`:''}
  </div>` : `<div style="font-size:11px;color:var(--muted);margin-bottom:10px;font-style:italic">No vessel selected yet — you can skip this and fill it in later.</div>`;

  const classTable = `<div style="overflow-x:auto;max-height:260px;overflow-y:auto">
    <table style="width:100%;border-collapse:collapse;font-size:12px">
      <thead><tr style="border-bottom:1px solid var(--border)">
        <th style="text-align:left;padding:4px 8px;color:var(--muted);font-size:10px;letter-spacing:1px">CLASS</th>
        <th style="text-align:left;padding:4px 8px;color:var(--muted);font-size:10px;letter-spacing:1px">ERA</th>
        <th style="text-align:center;padding:4px 8px;color:var(--muted);font-size:10px">SCL</th>
        <th style="text-align:left;padding:4px 8px;color:var(--muted);font-size:10px;letter-spacing:1px">COM/CPU/ENG/SEN/STR/WPN</th>
      </tr></thead>
      <tbody>${classRows}</tbody>
    </table>
  </div>
  ${buildShipPreviewPanel()}
  <p style="font-size:10px;color:var(--muted);margin-top:4px">Tap a class to preview it. All stats can be adjusted later on the Ship tab.</p>`;

  const customForm = `<div style="font-size:11px;color:var(--muted);margin-bottom:10px">Enter your ship's basics. Full stats and systems can be set on the Ship tab.</div>
  <div class="field"><label>Ship Name</label>
    <input value="${escH(sh.name)}" placeholder="e.g. USS Enterprise" onchange="saveShipField('name',this.value)">
  </div>
  <div style="display:flex;gap:8px;flex-wrap:wrap">
    <div class="field" style="flex:1;margin:0"><label>Registry</label>
      <input value="${escH(sh.registry)}" placeholder="NCC-1701" onchange="saveShipField('registry',this.value)">
    </div>
    <div class="field" style="flex:1;margin:0"><label>Class</label>
      <input value="${escH(sh.className)}" placeholder="e.g. Constitution" onchange="saveShipField('className',this.value)">
    </div>
    <div class="field" style="width:80px;margin:0"><label>Scale</label>
      <select onchange="saveShipField('scale',parseInt(this.value))">${[1,2,3,4,5,6,7].map(s=>`<option${sh.scale===s?' selected':''}>${s}</option>`).join('')}</select>
    </div>
  </div>
  <div class="field" style="margin-top:8px"><label>Mission Profile / Trait</label>
    <input value="${escH(sh.trait)}" placeholder="e.g. Exploration Vessel, Diplomatic Transport…" onchange="saveShipField('trait',this.value)">
  </div>`;

  return `
  <p style="font-size:11px;color:var(--muted);margin-bottom:10px">Choose your vessel from the class library or configure a custom ship. This step is optional.</p>
  ${selectedBadge}
  <div style="display:flex;gap:4px;flex-wrap:wrap;margin-bottom:10px">
    <button class="btn btn-sm${mode==='era'?' btn-accent':''}" onclick="window._csShipMode='era';renderCurrentTab()">${escH(eraLabel)}</button>
    <button class="btn btn-sm${mode==='all'?' btn-accent':''}" onclick="window._csShipMode='all';renderCurrentTab()">All Classes</button>
    <button class="btn btn-sm${mode==='custom'?' btn-accent':''}" onclick="window._csShipMode='custom';renderCurrentTab()">Custom</button>
  </div>
  ${mode === 'custom' ? customForm : classTable}`;
}

function shipIconHtml(size, style) {
  const extraStyle = style || 'filter:drop-shadow(0 0 4px rgba(255,153,0,0.9))';
  // 1. Use thumb from ship data if available
  if (S.ship && S.ship.thumb) {
    return `<img src="${S.ship.thumb}" style="width:${size}px;height:${size}px;object-fit:contain;${extraStyle}" alt="ship">`;
  }
  // 2. Fall back to name-matched SHIP_THUMBS
  const cls = (S.ship && S.ship.className) ? S.ship.className.toLowerCase().trim() : '';
  const key = Object.keys(SHIP_THUMBS).find(k => cls.includes(k));
  if (!key) return '🚀';
  return `<img src="${SHIP_THUMBS[key]}" style="width:${size}px;height:${size}px;object-fit:contain;${extraStyle}" alt="ship">`;
}

function eraBadgeSrc() {
  const era = (S.char && (S.char._selectedEra || S.char.era)) || '';
  const match = ERA_BADGES.find(e => e.keys.some(k => era.includes(k)));
  return match ? match.src : null;
}

function areaIconHtml(sz, size, style) {
  const humanScale = sz && ['ship','planet','station','other'].includes(sz.type);
  if (humanScale) {
    const src = eraBadgeSrc() || 'uniforms/era-2409.png';
    const s = style || 'filter:drop-shadow(0 0 4px rgba(153,204,255,0.9))';
    return `<img src="${src}" style="width:${size}px;height:${size}px;object-fit:contain;${s}" alt="crew">`;
  }
  return shipIconHtml(size, style);
}

function renderSectorMap() {
  const sector = S.sectors[S.activeSector];
  if (!sector) return '<div class="card"><p>No sector data.</p></div>';

  // ── SUB-ZONE VIEW ──────────────────────────────────────────────────────────
  if (window._mapZoom) {
    const sz = window._mapZoom.subZone;
    const szCellIdx = window._mapZoom.cellIdx;

    // Sub-zone grid
    let szGridHTML = '<div id="map-grid">';
    for(let i=0;i<25;i++){
      const cell = sz.cells[i];
      const isCurrent = sz.currentCell === i;
      const isAdj = isAdjacentCell(sz.currentCell, i) && !cell.isVoid;
      let cls = 'map-cell';
      if(cell.isVoid) cls += ' void';
      else if(isCurrent) cls += ' current';
      else if(isAdj) cls += ' adjacent';
      else if(cell.type === 'explored') cls += ' explored';
      else cls += ' unexplored';
      const icon = cell.icon || (isCurrent ? areaIconHtml(sz, 18) : '·');
      szGridHTML += `<div class="${cls}" onclick="clickSubZoneCell(${i})" title="${escH(cell.name)||'Area '+(i+1)}">
        <span style="font-size:9px;color:var(--muted);position:absolute;top:2px;left:4px">${i+1}</span>
        <span class="cell-icon">${icon}</span>
        ${cell.name?`<span class="cell-name">${escH(cell.name)}</span>`:''}
      </div>`;
    }
    szGridHTML += '</div>';

    // Sub-zone cell detail
    const szSelIdx = window._selectedMapCell ?? sz.currentCell;
    const szSelCell = sz.cells[szSelIdx];
    let szDetailHTML = '';
    if(szSelCell && !szSelCell.isVoid){
      const isCur = szSelIdx === sz.currentCell;
      const isAdjSel = isAdjacentCell(sz.currentCell, szSelIdx);
      szDetailHTML = `<div class="card">
        <div class="card-title">AREA ${szSelIdx+1}: ${escH(szSelCell.name)||'Unknown'}</div>
        <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px">
          ${!isCur && isAdjSel ? `<button class="btn btn-sm btn-accent" onclick="warpToSubZone(${szSelIdx})">${areaIconHtml(sz,14,'filter:drop-shadow(0 0 3px rgba(255,153,0,0.8))')} Move Here</button>` : ''}
          <button class="btn btn-sm" onclick="toggleSubZoneVoid(${szSelIdx})">${szSelCell.isVoid?'Clear Void':'Mark Void'}</button>
        </div>
        <div class="field"><label>Area Name</label>
          <input value="${escH(szSelCell.name)}" placeholder="e.g. Engineering Bay, Cargo Hold, Plaza…" onchange="setSubZoneCellProp(${szSelIdx},'name',this.value)">
        </div>
        <div class="field"><label>Icon (emoji)</label>
          <input value="${escH(szSelCell.icon)}" placeholder="e.g. 🏔 🌳 🏙 ⚡ 🌊" onchange="setSubZoneCellProp(${szSelIdx},'icon',this.value)">
        </div>
        <div class="field"><label>Feature</label>
          <input value="${escH(szSelCell.feature)}" placeholder="e.g. Ruins, Outpost, Natural Landmark…" onchange="setSubZoneCellProp(${szSelIdx},'feature',this.value)">
        </div>
        <div class="field"><label>Notes</label>
          <textarea rows="2" onchange="setSubZoneCellProp(${szSelIdx},'notes',this.value)">${escH(szSelCell.notes)}</textarea>
        </div>
      </div>`;
    }

    return `
    <div class="card">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;flex-wrap:wrap">
        <button class="btn btn-sm" onclick="exitSubZone()">← Back to ${escH(sector.name)}</button>
        <div class="card-title" style="margin:0">AREA MAP${sz.type?' <span style="font-size:9px;color:var(--muted);text-transform:capitalize;font-weight:normal">('+sz.type+')</span>':''}</div>
      </div>
      <div style="font-size:14px;color:var(--accent);font-weight:bold;margin-bottom:8px">
        <input value="${escH(sz.name)}" style="background:transparent;border:none;border-bottom:1px solid var(--accent);color:var(--accent);font-weight:bold;font-size:14px;width:100%" onchange="setSubZoneName(this.value)" placeholder="Area name…">
      </div>
      <p style="font-size:10px;color:var(--muted);margin-bottom:8px">Area map for <strong>${escH(sector.cells[szCellIdx].name||'Cell '+(szCellIdx+1))}</strong>. Click adjacent area to move. Click any cell to edit.</p>
      ${szGridHTML}
      <div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:6px;font-size:10px;color:var(--muted)">
        <span style="color:var(--accent)">▣ Current</span>
        <span style="color:var(--info)">▣ Adjacent (can warp)</span>
        <span>■ Explored</span>
        <span style="opacity:0.5">■ Unexplored</span>
        <span style="opacity:0.3">■ Void</span>
      </div>
    </div>
    ${szDetailHTML}`;
  }

  // ── NORMAL SECTOR VIEW ────────────────────────────────────────────────────
  const m = sector;

  // Sector switcher
  let sectorSwitcher = '<div style="display:flex;gap:6px;flex-wrap:wrap;align-items:center;margin-bottom:10px">';
  S.sectors.forEach((sec,i)=>{
    sectorSwitcher += `<button class="btn btn-sm${i===S.activeSector?' btn-accent':''}" onclick="switchSector(${i})">${escH(sec.name)}</button>`;
  });
  sectorSwitcher += `<button class="btn btn-sm" onclick="newSector()">+ New Sector</button>`;
  sectorSwitcher += '</div>';

  // Grid
  let gridHTML = '<div id="map-grid">';
  for(let i=0;i<25;i++){
    const cell = m.cells[i];
    const isCurrent = m.currentCell === i;
    const isAdj = isAdjacentCell(m.currentCell, i) && !cell.isVoid;
    let cls = 'map-cell';
    if(cell.isVoid) cls += ' void';
    else if(isCurrent) cls += ' current';
    else if(isAdj) cls += ' adjacent';
    else if(cell.type === 'explored') cls += ' explored';
    else cls += ' unexplored';
    const icon = cell.icon || (isCurrent ? shipIconHtml(18) : '·');
    gridHTML += `<div class="${cls}" onclick="clickMapCell(${i})" title="${escH(cell.name)||'System '+i}">
      <span style="font-size:9px;color:var(--muted);position:absolute;top:2px;left:4px">${i+1}</span>
      <span class="cell-icon">${icon}</span>
      ${cell.name?`<span class="cell-name">${escH(cell.name)}</span>`:''}
    </div>`;
  }
  gridHTML += '</div>';

  // Cell detail
  const selIdx = window._selectedMapCell ?? m.currentCell;
  const selCell = m.cells[selIdx];
  let detailHTML = '';
  if(selCell && !selCell.isVoid){
    const isCur = selIdx === m.currentCell;
    const isAdjSel = isAdjacentCell(m.currentCell, selIdx);
    detailHTML = `<div class="card">
      <div class="card-title">SYSTEM ${selIdx+1}: ${escH(selCell.name)||'Unknown'}</div>
      <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px">
        ${!isCur && isAdjSel ? `<button class="btn btn-sm btn-accent" onclick="warpTo(${selIdx})">${shipIconHtml(14,'filter:drop-shadow(0 0 3px rgba(255,153,0,0.8))')} Warp Here</button>` : ''}
        <button class="btn btn-sm" onclick="toggleVoid(${selIdx})">${selCell.isVoid?'Clear Void':'Mark Void'}</button>
        <button class="btn btn-sm" onclick="enterSubZone(${selIdx})">🔍 Enter Area${selCell.subZone?' ('+selCell.subZone.type+')':''}</button>
      </div>
      <div class="field"><label>System Name</label>
        <input value="${escH(selCell.name)}" placeholder="e.g. Veridian III, Deep Space 9…" onchange="setCellProp(${selIdx},'name',this.value)">
      </div>
      <div class="field"><label>Icon (emoji)</label>
        <input value="${escH(selCell.icon)}" placeholder="e.g. 🌍 ⭐ 🏛 ☄️ 🌌 💫" onchange="setCellProp(${selIdx},'icon',this.value)">
      </div>
      <div class="field"><label>Feature</label>
        <input value="${escH(selCell.feature)}" placeholder="e.g. Class-M Planet, Starbase…" onchange="setCellProp(${selIdx},'feature',this.value)">
      </div>
      <div class="field"><label>Notes</label>
        <textarea rows="2" onchange="setCellProp(${selIdx},'notes',this.value)">${escH(selCell.notes)}</textarea>
      </div>
    </div>`;
  }

  // Ship quick info
  const ship = S.ship;
  const shipInfo = ship.name ? `<div style="background:var(--surface2);border:1px solid var(--border);border-radius:4px;padding:8px 12px;font-size:11px;margin-bottom:10px;display:flex;gap:10px;align-items:center">
    <span style="font-size:20px;line-height:1;display:flex;align-items:center">${shipIconHtml(40,'filter:drop-shadow(0 0 5px rgba(255,153,0,0.9))')}</span>
    <div>
      <div style="color:var(--accent);font-weight:bold">${escH(ship.name)}</div>
      <div style="color:var(--muted)">${escH(ship.className)} · Scale ${ship.scale} · ${escH(ship.era)}</div>
    </div>
    <button class="btn btn-xs" style="margin-left:auto" onclick="showTab('character');setOfficerSubTab('ship')">Ship Details →</button>
  </div>` : `<div style="color:var(--muted);font-size:11px;margin-bottom:8px">No ship configured. <button class="btn btn-xs" onclick="showTab('character');setOfficerSubTab('ship')">Configure Ship →</button></div>`;

  return `
  <div class="card">
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;flex-wrap:wrap">
      <div class="card-title" style="margin:0">SECTOR MAP</div>
      <div style="margin-left:auto;display:flex;gap:6px">
        <button class="btn btn-sm" onclick="renameSector()">Rename Sector</button>
        ${S.sectors.length>1?`<button class="btn btn-sm btn-danger" onclick="deleteSector()">Delete Sector</button>`:''}
      </div>
    </div>
    <div style="font-size:14px;color:var(--accent);font-weight:bold;margin-bottom:8px">${escH(m.name)}</div>
    ${sectorSwitcher}
    ${shipInfo}
    <p style="font-size:10px;color:var(--muted);margin-bottom:8px">5×5 sector grid. 🚀 = current position. Click adjacent system to warp. Click any cell to edit.</p>
    ${gridHTML}
    <div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:6px;font-size:10px;color:var(--muted)">
      <span style="color:var(--accent)">▣ Current</span>
      <span style="color:var(--info)">▣ Adjacent (can warp)</span>
      <span>■ Explored</span>
      <span style="opacity:0.5">■ Unexplored</span>
      <span style="opacity:0.3">■ Void</span>
    </div>
  </div>
  ${detailHTML}`;
}

function renderShipTab() {
  const sh = S.ship;

  // ── Ship Class Library picker ──────────────────────────────────────────────
  const eras = [...new Set(SHIP_CLASSES.map(c=>c.era))];
  const eraFilter = window._shipEraFilter || 'all';
  const filtered = eraFilter==='all' ? SHIP_CLASSES : SHIP_CLASSES.filter(c=>c.era===eraFilter);
  const eraFilterBtns = `<button class="btn btn-xs${eraFilter==='all'?' btn-accent':''}" onclick="window._shipEraFilter='all';renderCurrentTab()">All</button>`
    + eras.map(e=>`<button class="btn btn-xs${eraFilter===e?' btn-accent':''}" onclick="window._shipEraFilter='${escQ(e)}';renderCurrentTab()">${e}</button>`).join('');

  const classRows = filtered.map(c => {
    const isSel = sh.className===c.name && sh.era===c.era;
    const isPrev = window._shipClassPreview === c.name;
    const rowBg = isPrev ? 'background:rgba(255,153,0,0.22)' : (isSel ? 'background:var(--accent-glow)' : '');
    return `<tr onclick="previewShipClass('${escQ(c.name)}')" style="cursor:pointer;${rowBg}">
      <td style="color:${(isSel||isPrev)?'var(--accent)':'var(--text)'};font-weight:bold;padding:5px 8px">${escH(c.name)}${isSel?' ✓':''}${isPrev?' ▼':''}</td>
      <td style="color:var(--muted);font-size:10px;padding:5px 8px">${escH(c.era)}</td>
      <td style="text-align:center;padding:5px 8px">${c.scale}</td>
      <td style="font-size:10px;padding:5px 8px;color:var(--text)">${c.comms}/${c.computers}/${c.engines}/${c.sensors}/${c.structure}/${c.weapons}</td>
    </tr>`;
  }).join('');

  const classPickerHTML = `
  <div class="card">
    <div class="collapsible-header" onclick="toggleCollapsible('ship-class-body')">
      <span class="card-title" style="margin:0">SHIP CLASS LIBRARY</span>
      <span class="collapse-icon">▼</span>
    </div>
    <div class="collapsible-body" id="ship-class-body">
      <div style="display:flex;gap:4px;flex-wrap:wrap;margin-bottom:8px">${eraFilterBtns}</div>
      <div style="overflow-x:auto">
        <table style="width:100%;border-collapse:collapse;font-size:12px">
          <thead><tr style="border-bottom:1px solid var(--border)">
            <th style="text-align:left;padding:4px 8px;color:var(--muted);font-size:10px;letter-spacing:1px">CLASS</th>
            <th style="text-align:left;padding:4px 8px;color:var(--muted);font-size:10px;letter-spacing:1px">ERA</th>
            <th style="text-align:center;padding:4px 8px;color:var(--muted);font-size:10px">SCL</th>
            <th style="text-align:left;padding:4px 8px;color:var(--muted);font-size:10px;letter-spacing:1px">COM/CPU/ENG/SEN/STR/WPN</th>
          </tr></thead>
          <tbody>${classRows}</tbody>
        </table>
      </div>
      ${buildShipPreviewPanel()}
      <p style="font-size:10px;color:var(--muted);margin-top:6px">Tap a class to preview it. Ship name and registry are preserved when you select.</p>
    </div>
  </div>`;

  // Systems
  let sysHTML = '<div class="attr-grid">';
  SYS_KEYS.forEach((k,idx)=>{
    sysHTML += `<div class="attr-box">
      <div class="attr-abbr" style="font-size:8px">${SYS_FULL[idx].slice(0,4).toUpperCase()}</div>
      <div class="attr-val">${sh[k]||7}</div>
      <div style="display:flex;gap:4px;justify-content:center;margin-top:2px">
        <button class="res-btn" onclick="adjShipSys('${k}',-1)">-</button>
        <button class="res-btn" onclick="adjShipSys('${k}',1)">+</button>
      </div>
      <div class="attr-full" style="font-size:7px">${SYS_FULL[idx]}</div>
    </div>`;
  });
  sysHTML += '</div>';

  // Departments
  let deptHTML = '<div class="disc-grid">';
  DISCIPLINES.forEach(d=>{
    const rank = sh[d.key]||1;
    let dots = '<div class="disc-dots">';
    for(let i=1;i<=5;i++) dots += `<div class="dot${i<=rank?' filled':''}" onclick="setShipDept('${d.key}',${i})" ondblclick="setShipDept('${d.key}',1)"></div>`;
    dots += '</div>';
    deptHTML += `<div class="disc-row">
      <span style="font-size:9px;color:var(--muted);min-width:28px">${d.abbr}</span>
      <span class="disc-name">${d.full}</span>
      ${dots}
      <span style="font-size:11px;color:var(--accent);min-width:16px">${rank}</span>
    </div>`;
  });
  deptHTML += '</div>';

  // Ship talents
  let talHTML = '';
  if(sh.talents&&sh.talents.length) talHTML = sh.talents.map((t,i)=>`<div class="perk-item"><span class="perk-name">${escH(t.name)}</span> — ${escH(t.desc||'')} <button class="btn btn-xs btn-danger" onclick="removeShipTalent(${i})">✕</button></div>`).join('');

  const scaleOpts = [1,2,3,4,5,6,7].map(s=>`<option${sh.scale===s?' selected':''}>${s}</option>`).join('');

  // ── Interior map grid ─────────────────────────────────────────────────────
  if (!sh.interiorCells || sh.interiorCells.length !== 50) {
    sh.interiorCells = Array.from({length:50}, (_,i) => ({
      name:'', icon:'', notes:'', isVoid: SHIP_INTERIOR_HULL[i]
    }));
  }
  let interiorCellsHTML = '';
  sh.interiorCells.forEach((_, i) => { interiorCellsHTML += interiorCellHTML(i); });

  const interiorMapHTML = `
  <div class="card">
    <div class="card-title">SHIP INTERIOR MAP</div>
    <p style="font-size:10px;color:var(--muted);margin-bottom:8px">Top-down deck layout. Click a room to label it. Click void (dashed) cells to add them to the hull.</p>
    <div style="display:grid;grid-template-columns:repeat(5,1fr);gap:3px;max-width:320px;margin:0 auto">
      ${interiorCellsHTML}
    </div>
    <div style="display:flex;gap:8px;margin-top:8px;font-size:10px;color:var(--muted);flex-wrap:wrap">
      <span>■ <span style="color:var(--text)">Active room</span></span>
      <span style="border:1px dashed #1a2a3a;padding:0 4px">Void (outside hull)</span>
      <button class="btn btn-xs btn-danger" onclick="resetInteriorMap()" style="margin-left:auto">Reset Layout</button>
    </div>
  </div>`;

  return classPickerHTML + `
  <div class="card">
    <div class="card-title">SHIP INFORMATION</div>
    <div class="section-row">
      <div class="field" style="flex:2;margin:0"><label>Ship Name</label>
        <input value="${escH(sh.name)}" placeholder="e.g. USS Enterprise" onchange="saveShipField('name',this.value)">
      </div>
      <div class="field" style="flex:1;margin:0"><label>Registry</label>
        <input value="${escH(sh.registry)}" placeholder="NCC-1701" onchange="saveShipField('registry',this.value)">
      </div>
    </div>
    <div class="section-row">
      <div class="field" style="flex:2;margin:0"><label>Class</label>
        <input value="${escH(sh.className)}" placeholder="e.g. Constitution, Galaxy, Intrepid" onchange="saveShipField('className',this.value)">
      </div>
      <div class="field" style="flex:1;margin:0"><label>Scale (1–6)</label>
        <select onchange="saveShipField('scale',parseInt(this.value))">${scaleOpts}</select>
      </div>
    </div>
    <div class="field"><label>Mission Profile / Trait</label>
      <input value="${escH(sh.trait)}" placeholder="e.g. Exploration Vessel, Warship, Diplomatic Transport" onchange="saveShipField('trait',this.value)">
    </div>
  </div>

  <div class="card">
    <div class="card-title">SYSTEMS (like Attributes)</div>
    ${sysHTML}
  </div>

  <div class="card">
    <div class="card-title">DEPARTMENTS (like Disciplines)</div>
    ${deptHTML}
  </div>

  <div class="card">
    <div class="collapsible-header" onclick="toggleCollapsible('ship-talent-body')">
      <span class="card-title" style="margin:0">SHIP TALENTS</span>
      <span class="collapse-icon">▼</span>
    </div>
    <div class="collapsible-body" id="ship-talent-body">
      ${talHTML||'<p style="color:var(--muted);font-size:11px">No talents.</p>'}
      <div style="display:flex;gap:6px;margin-top:8px;flex-wrap:wrap">
        <input id="ship-talent-name-in" placeholder="Talent name" style="flex:1;background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:5px 8px;border-radius:3px;font-size:12px;min-width:0">
        <input id="ship-talent-desc-in" placeholder="Description" style="flex:2;background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:5px 8px;border-radius:3px;font-size:12px;min-width:0">
        <button class="btn btn-sm btn-accent" onclick="addShipTalent()">ADD</button>
      </div>
    </div>
  </div>

  ${interiorMapHTML}
  <div class="card">
    <div class="field"><label>Ship Notes</label>
      <textarea rows="3" onchange="saveShipField('notes',this.value)">${escH(sh.notes)}</textarea>
    </div>
  </div>
`;
}

let _npcFilter = 'all';

function renderNPCsTab() {
  // Active combat
  let activeHTML = '';
  if (S.combatEnemies.length) {
    activeHTML = `<div class="card">
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap">
      <span class="card-title" style="margin:0">ACTIVE ENCOUNTER</span>
      <button class="btn btn-xs btn-danger" style="margin-left:auto" onclick="clearEncounter()">Clear Encounter</button>
    </div>`;
    S.combatEnemies.forEach((ae,idx)=>{
      const stress = ae.stress || [false,false,false,false,false,false];
      let circles = '<div class="stress-track">';
      for(let i=0;i<6;i++) circles += `<div class="stress-circle${stress[i]?' hit':''}" onclick="toggleEnemyStress(${idx},${i})"></div>`;
      circles += '</div>';
      const attColor = ae.attitude==='Hostile'?'var(--danger)':ae.attitude==='Suspicious'?'var(--warning)':ae.attitude==='Friendly'?'var(--success)':ae.attitude==='Allied'?'var(--accent)':'var(--muted)';
      activeHTML += `<div style="border:1px solid var(--border);border-radius:4px;padding:10px;margin-bottom:8px">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;flex-wrap:wrap">
          <span style="font-size:13px;font-weight:bold;flex:1">${escH(ae.name)}</span>
          <span style="font-size:10px;color:${attColor};padding:1px 6px;border:1px solid ${attColor};border-radius:2px">${escH(ae.attitude||'Neutral')}</span>
          <button class="btn btn-xs btn-danger" onclick="removeFromEncounter(${idx})">✕ Remove</button>
        </div>
        <div style="font-size:10px;color:var(--muted);margin-bottom:5px">STRESS TRACK (click to mark)</div>
        ${circles}
        ${ae.notes?`<div style="font-size:11px;color:var(--muted);margin-top:5px;padding:4px 6px;background:var(--surface2);border-radius:3px">${escH(ae.notes)}</div>`:''}
      </div>`;
    });
    activeHTML += '</div>';
  }

  // NPC filter
  const cats = ['all','Federation','Klingon','Romulan','Cardassian','Borg','Ferengi','Civilian','Other'];
  let filterHTML = '<div style="display:flex;gap:4px;flex-wrap:wrap;margin-bottom:10px">';
  cats.forEach(cat=>{
    filterHTML += `<button class="filter-btn${_npcFilter===cat?' active':''}" onclick="setNPCFilter('${cat}')">${cat==='all'?'ALL':cat.toUpperCase()}</button>`;
  });
  filterHTML += '</div>';

  const visible = S.npcs.filter(n=>_npcFilter==='all'||n.faction===_npcFilter);

  let npcListHTML = '';
  visible.forEach((npc,idx)=>{
    const realIdx = S.npcs.indexOf(npc);
    const attClass = npc.attitude==='Hostile'?'att-hostile':npc.attitude==='Suspicious'?'att-suspicious':npc.attitude==='Friendly'?'att-friendly':npc.attitude==='Allied'?'att-allied':'att-neutral';

        ${npc.notes?`<div style="font-size:11px;color:var(--text);white-space:pre-wrap;margin-bottom:6px">${escH(npc.notes)}</div>`:''}
        <div style="margin-top:6px">

        </div>
      </div>

  });

  return `
  ${activeHTML}
  <div class="card">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;flex-wrap:wrap;gap:8px">

    ${npcListHTML||'<p style="color:var(--muted);font-size:11px">No NPCs yet. Create or generate one.</p>'}
  </div>`;
}

function wireDice() { updateTN(); updateShipTN(); }

function rollOpposition() {
  const tn=parseInt(document.getElementById('opp-tn')?.value||10);
  const diff=parseInt(document.getElementById('opp-difficulty')?.value||1);
  const numDice=parseInt(document.getElementById('opp-dice')?.value||2);
  const focusCheck=document.getElementById('opp-focus-check')?.checked||false;
  const focusThreshold=Math.floor(tn/2);

  const rolls=[];
  for(let i=0;i<numDice;i++) rolls.push(Math.floor(Math.random()*20)+1);

  let totalSucc=0, complications=0;
  const diceHTML=rolls.map(r=>{
    let succ=0, cls='fail';
    if(r===20){ complications++; cls='complication'; }
    else if(r===1){ succ=2; cls='critical'; }
    else if(focusCheck && r<=focusThreshold){ succ=2; cls='success'; }
    else if(r<=tn){ succ=1; cls='success'; }
    totalSucc+=succ;
    return `<div class="die-result ${cls}" title="${succ>0?succ+' success':''}">${r}</div>`;
  }).join('');

  const netSucc=totalSucc-diff;
  const success=netSucc>=0;
  const excess=success?netSucc:0;
  if(excess>0){ S.char.threat=Math.min(99,S.char.threat+excess); }

  let resultColor=success?'var(--danger)':'var(--success)';
  let resultText=success
    ?`OPPOSITION SUCCEEDS (${totalSucc}/${diff} successes${excess>0?`, +${excess} Threat`:''})`
    :`OPPOSITION FAILS (${totalSucc}/${diff} successes needed)`;
  if(complications>0) resultText+=` — ${complications} COMPLICATION${complications>1?'S':''}!`;

  const html=`<div class="dice-result-row">${diceHTML}</div>
    <div style="font-size:14px;font-weight:bold;color:${resultColor};margin:8px 0">${resultText}</div>
    <div style="font-size:10px;color:var(--muted)">TN: ${tn} | Difficulty: ${diff} | ${numDice} dice${focusCheck?` | Focus/Talent (≤${focusThreshold})`:''}</div>`;

  window._lastOppRollResult=html;
  const resultEl=document.getElementById('opp-roll-result');
  if(resultEl) resultEl.innerHTML=html;
  const tEl=document.getElementById('dice-threat-val');
  if(tEl) tEl.textContent=S.char.threat;
  _lastRollData = { rolls, tn, successes: totalSucc, complications, diff, label: 'Opposition', success };
  saveSlot();
}

function rollShipTask() {
  const sEl=document.getElementById('ship-roll-sys');
  const dEl=document.getElementById('ship-roll-dept');
  const diff=parseInt(document.getElementById('ship-roll-difficulty').value)||1;
  const extra=parseInt(document.getElementById('ship-extra-dice')?.value||0);
  const talentCheck=document.getElementById('ship-talent-check')?.checked||false;
  const [sKey,sv]=sEl.value.split('|');
  const [dKey,dv]=dEl.value.split('|');
  const sysVal=parseInt(sv);
  const tn=sysVal+parseInt(dv);

  if(extra>0){
    const spent=Math.min(extra,S.char.momentum);
    S.char.momentum=Math.max(0,S.char.momentum-spent);
    S.char.threat+=extra-spent;
  }

  const numDice=2+extra;
  const rolls=[];
  for(let i=0;i<numDice;i++) rolls.push(Math.floor(Math.random()*20)+1);

  let totalSucc=0, complications=0;
  const diceHTML=rolls.map(r=>{
    let succ=0, cls='fail';
    if(r===20){ complications++; cls='complication'; }
    else if(r===1){ succ=2; cls='critical'; }
    else if(talentCheck && r<=sysVal){ succ=2; cls='success'; }
    else if(r<=tn){ succ=1; cls='success'; }
    totalSucc+=succ;
    return `<div class="die-result ${cls}" title="${succ>0?succ+' success':''}">${r}</div>`;
  }).join('');

  const netSucc=totalSucc-diff;
  const success=netSucc>=0;
  const momentum=success?netSucc:0;
  if(momentum>0){ S.char.momentum=Math.min(6,S.char.momentum+momentum); }

  let resultColor=success?'var(--success)':'var(--danger)';
  let resultText=success?`SUCCESS (${totalSucc}/${diff} successes, +${momentum} Momentum)`:`FAILURE (${totalSucc}/${diff} successes needed)`;
  if(complications>0) resultText+=` — ${complications} COMPLICATION${complications>1?'S':''}!`;

  const sysLabel=SYS_FULL[SYS_KEYS.indexOf(sKey)]||sKey;
  const deptLabel=DISCIPLINES.find(d=>d.key===dKey)?.full||dKey;
  const html=`<div class="dice-result-row">${diceHTML}</div>
    <div style="font-size:14px;font-weight:bold;color:${resultColor};margin:8px 0">${resultText}</div>
    <div style="font-size:10px;color:var(--muted)">TN: ${tn} (${sysLabel} ${sysVal} + ${deptLabel} ${dv}) | Difficulty: ${diff} | ${numDice} dice${talentCheck?' | Talent active':''}</div>`;

  window._lastShipRollResult=html;
  const resultEl=document.getElementById('ship-roll-result');
  if(resultEl) resultEl.innerHTML=html;
  const mEl=document.getElementById('dice-momentum-val');
  if(mEl) mEl.textContent=S.char.momentum;
  const tEl=document.getElementById('dice-threat-val');
  if(tEl) tEl.textContent=S.char.threat;
  _lastRollData = { rolls, tn, successes: totalSucc, complications, diff, label: 'Ship Task', success };
  saveSlot();
}

function renderLogTab() {
  if(window._logNewestFirst===undefined) window._logNewestFirst=true;
  const nf = window._logNewestFirst;
  const entries = S.log;
  let entriesHTML = '';

  if(!entries.length) {
    entriesHTML = '<p style="color:var(--muted);font-size:11px">No log entries yet.</p>';
  } else {
    const ordered = nf ? [...entries].map((n,i)=>({n,i})).reverse() : entries.map((n,i)=>({n,i}));
    ordered.forEach(({n:entry, i})=>{
      const typeInfo = LOG_TYPES.find(t=>t.key===entry.type)||LOG_TYPES[0];
      const emoji = entry.emoji||typeInfo.emoji;
      const label = typeInfo.label;
      const isMajor = entry.type==='log';
      const isAlert = entry.type==='alert';
      const isSupp = entry.type==='supplemental';

      let cls = 'log-entry-base';
      if(isMajor) cls='log-entry-major';
      else if(isAlert) cls='log-entry-alert';
      else if(isSupp) cls='log-entry-supplemental';

      entriesHTML += `<div class="${cls}">
        <div style="display:flex;align-items:flex-start;gap:8px">
          <span style="font-size:${isMajor?'22':'18'}px">${emoji}</span>
          <div style="flex:1;min-width:0">
            <div style="font-size:${isMajor?'14':'12'}px;font-weight:bold;color:${isMajor?'var(--accent)':isAlert?'var(--danger)':isSupp?'var(--info)':'var(--text)'}">${escH(entry.title||label)}</div>
            <div style="font-size:9px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-top:1px">${label} · ${entry.date||''}</div>
          </div>
          <button class="btn btn-xs" onclick="editLogEntry(${i})" style="margin-right:2px">✎</button>
          <button class="btn btn-xs btn-danger" onclick="deleteLogEntry(${i})">✕</button>
        </div>
        ${entry.body?`<div style="font-size:${isMajor?'12':'11'}px;color:var(--text);line-height:1.6;margin-top:6px;white-space:pre-wrap">${escH(entry.body)}</div>`:''}
      </div>`;
    });
  }

  return `
  <div class="card">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:6px">
      <div class="card-title" style="margin:0">CAPTAIN'S LOG</div>
      <button onclick="window._logNewestFirst=!window._logNewestFirst;renderCurrentTab()" style="background:var(--surface2);border:1px solid var(--border);border-radius:4px;padding:4px 10px;cursor:pointer;color:var(--muted);font-family:var(--font);font-size:11px">
        ${nf?'↓ Newest':'↑ Oldest'}
      </button>
    </div>
    <div id="log-list">${entriesHTML}</div>
  </div>
  <button class="fab" onclick="showAddLogEntry()" title="New log entry">+</button>`;
}

function openModal(html) {
  document.getElementById('modal-body').innerHTML = html;
  document.getElementById('modal-overlay').classList.remove('hidden');
}
function closeModal(e) {
  if(!e || e.target===document.getElementById('modal-overlay'))
    document.getElementById('modal-overlay').classList.add('hidden');
}
function dismissModal() { closeModal(); }

function showConfirm(msg, fn, confirmLabel, dangerStyle) {
  window._confirmFn = fn;
  const btnClass = dangerStyle !== false ? 'btn-danger' : 'btn-accent';
  const label = confirmLabel || 'CONFIRM';
  openModal(`<p style="font-size:13px;line-height:1.5;margin-bottom:16px">${msg}</p>
  <div style="display:flex;gap:8px">
    <button class="btn ${btnClass}" onclick="_doConfirm()" style="flex:1">${label}</button>
    <button class="btn" onclick="closeModal()" style="flex:1">CANCEL</button>
  </div>`);
}
function _doConfirm() { const fn=window._confirmFn; window._confirmFn=null; closeModal(); if(fn) fn(); }

function showPrompt(msg, defaultVal, fn) {
  window._promptFn = fn;
  openModal(`<p style="font-size:13px;margin-bottom:10px">${msg}</p>
  <input id="prompt-input" style="width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:6px 8px;border-radius:3px;font-size:13px;margin-bottom:12px;box-sizing:border-box" value="${escH(defaultVal||'')}">
  <div style="display:flex;gap:8px">
    <button class="btn btn-accent" onclick="_doPrompt()" style="flex:1">OK</button>
    <button class="btn" onclick="closeModal()" style="flex:1">CANCEL</button>
  </div>`);
  setTimeout(()=>{const i=document.getElementById('prompt-input');if(i){i.focus();i.select();}},50);
}
function _doPrompt() { const v=document.getElementById('prompt-input')?.value; const fn=window._promptFn; window._promptFn=null; closeModal(); if(fn&&v)fn(v); }

function openSlotModal() {
  openModal(`<h2>SAVE SLOTS</h2>
  <p style="font-size:11px;color:var(--muted);margin-bottom:12px">Switch or clear mission save slots.</p>
  ${[0,1,2].map(i=>{
    const raw=localStorage.getItem(`stcl_slot_${i}`);
    let label=`Mission ${i+1} — Empty`;
    if(raw){try{const d=JSON.parse(raw);if(d.char?.name)label=`Mission ${i+1} — ${d.char.name}`;}catch(e){}}
    return `<div style="display:flex;gap:8px;align-items:center;margin-bottom:8px;padding:8px;background:var(--surface2);border-radius:4px">
      <span style="flex:1;font-size:12px">${label}</span>
      <button class="btn btn-sm btn-accent" onclick="selectSlot(${i});dismissModal()">${i===ACTIVE_SLOT?'Active':'Load'}</button>
      ${raw?`<button class="btn btn-sm btn-danger" onclick="clearSlot(${i})">Clear</button>`:''}
    </div>`;
  }).join('')}
  <button class="btn" style="margin-top:8px" onclick="dismissModal()">Close</button>`);
}
function clearSlot(i) {
  showConfirm(`Clear Mission ${i+1}? This cannot be undone.`, ()=>{
    localStorage.removeItem(`stcl_slot_${i}`);
    if(i===ACTIVE_SLOT){ S=defaultState(); saveSlot(); }
    updateSlotLabels(); openSlotModal();
  });
}

function saveLogEntry() {

  const date = `${now.getFullYear()}.${String(now.getMonth()+1).padStart(2,'0')}.${String(now.getDate()).padStart(2,'0')}`;
  S.log.push({type, emoji, title, body, date});
  saveSlot(); closeModal(); renderCurrentTab();
}

function rollSkillTest() {
  const aEl=document.getElementById('roll-attr');
  const dEl=document.getElementById('roll-disc');
  const diff=parseInt(document.getElementById('roll-difficulty').value)||1;
  const extra=parseInt(document.getElementById('extra-dice')?.value||0);
  const focusCheck=document.getElementById('focus-check')?.checked||false;
  const [aKey,av]=aEl.value.split('|');
  const [dKey,dv]=dEl.value.split('|');
  const tn=parseInt(av)+parseInt(dv);
  const discRank=parseInt(dv);

  // Spend momentum for extra dice
  if(extra>0) {
    const spent=Math.min(extra,S.char.momentum);
    S.char.momentum=Math.max(0,S.char.momentum-spent);
    S.char.threat+=extra-spent; // any extra above available momentum add to threat
  }

  const numDice=2+extra;
  const rolls=[];
  for(let i=0;i<numDice;i++) rolls.push(Math.floor(Math.random()*20)+1);

  let totalSucc=0, complications=0;
  const diceHTML = rolls.map(r=>{
    let succ=0, cls='fail';
    if(r===20){ complications++; cls='complication'; succ=1; } // 20 = complication + 1 success if ≤ TN
    else if(r===1){ succ=2; cls='critical'; }
    else if(focusCheck && r<=discRank){ succ=2; cls='success'; }
    else if(r<=tn){ succ=1; cls='success'; }
    totalSucc+=succ;
    return `<div class="die-result ${cls}" title="${succ>0?succ+' success':''}">${r}</div>`;
  }).join('');

  const netSucc=totalSucc-diff;
  const success=netSucc>=0;
  const momentum=success?netSucc:0;
  if(momentum>0){ S.char.momentum=Math.min(6,S.char.momentum+momentum); }

  let resultColor=success?'var(--success)':'var(--danger)';
  let resultText=success?`SUCCESS (${totalSucc}/${diff} successes, +${momentum} Momentum)`:`FAILURE (${totalSucc}/${diff} successes needed)`;
  if(complications>0) resultText+=` — ${complications} COMPLICATION${complications>1?'S':''}!`;

  const html=`<div class="dice-result-row">${diceHTML}</div>
    <div style="font-size:14px;font-weight:bold;color:${resultColor};margin:8px 0">${resultText}</div>
    <div style="font-size:10px;color:var(--muted)">TN: ${tn} | Difficulty: ${diff} | ${numDice} dice | ${focusCheck?'Focus active':'No focus'}</div>`;

  window._lastRollResult = html;
  const resultEl = document.getElementById('skill-roll-result');
  if (resultEl) resultEl.innerHTML = html;
  const mEl = document.getElementById('dice-momentum-val');
  if (mEl) mEl.textContent = S.char.momentum;
  const tEl = document.getElementById('dice-threat-val');
  if (tEl) tEl.textContent = S.char.threat;
  _lastRollData = { rolls, tn, successes: totalSucc, complications, diff, label: 'Officer Task', success };
  saveSlot();
}

function oracleRoll(likelihood) {
  const matrix=YES_NO_MATRIX[likelihood];
  const roll=Math.floor(Math.random()*20)+1;
  let result, cls, sub;

  if(roll<=matrix.yes){ result='YES'; cls='yes'; sub='Straightforward yes.'; }
  else if(roll<=matrix.yestwist){ result='YES — but…'; cls='yes-twist'; sub='Yes, but with an unexpected complication.'; }
  else if(roll<=matrix.notwist){ result='NO — however…'; cls='no-twist'; sub='No, but something useful or interesting happens.'; }
  else{ result='NO'; cls='no'; sub='Straight refusal or negative outcome.'; }

  const dieHTML=`<div class="die-result ${roll<=matrix.yestwist?'success':roll>matrix.notwist?'complication':'fail'}">${roll}</div>`;

  document.getElementById('oracle-result-card').style.display='block';
  document.getElementById('oracle-detail-text').textContent=`${likelihood} — rolled ${roll}`;
  document.getElementById('oracle-dice-row').innerHTML=dieHTML;
  document.getElementById('oracle-result-text').className=`oracle-result ${cls}`;
  document.getElementById('oracle-result-text').textContent=result;
  document.getElementById('oracle-sub-text').textContent=sub;
}

      break;

    case 'npc_archetype': window._storyResults['npc_archetype']={desc:`${r+1}: ${NPC_ARCHETYPE_TABLE[r]}`}; break;
    case 'npc_upbringing': window._storyResults['npc_upbringing']={desc:`${r+1}: ${NPC_UPBRINGING_ENVS[r]}`}; break;
    case 'npc_cultural': window._storyResults['npc_cultural']={desc:`${r+1}: ${NPC_CULTURAL_TRAITS[r]}`}; break;

function genAlienName(sylCount) {
  const d20=()=>Math.floor(Math.random()*20);
  const n=sylCount||(Math.floor(Math.random()*3)+2);
  const prog=ALIEN_NAME_GEN.progressions[d20()];
  const parts={A:ALIEN_NAME_GEN.A[d20()],B:ALIEN_NAME_GEN.B[d20()],C:ALIEN_NAME_GEN.C[d20()],D:ALIEN_NAME_GEN.D[d20()]};
  const raw=prog.slice(0,n).split('').map(c=>parts[c]).join('');
  return raw.charAt(0).toUpperCase()+raw.slice(1).toLowerCase();
}

function creationAdjAttr(key,d) {

  if (sp) {
    Object.entries(sp._attr||{}).forEach(([k,v]) => { if(b[k]!==undefined) b[k]+=v; });
    (lp.speciesAttrFree||[]).forEach(k => { if(b[k]!==undefined) b[k]++; });
  }
  if (lp.envAttr && b[lp.envAttr]!==undefined) b[lp.envAttr]++;
  if (lp.upbrAttr && b[lp.upbrAttr]!==undefined) b[lp.upbrAttr]++;
  return b;
}
function lpDiscBonuses() {
  const c = S.char; const lp = c._lp||{};
  const b = {}; DISCIPLINES.forEach(d => b[d.key]=0);
  const sp = SPECIES_LIST.find(s => s.name === c._selectedSpecies);
  if (sp) {
    if (sp._discOpts && sp._discOpts.length > 0) {
      if (lp.speciesDiscChoice && b[lp.speciesDiscChoice]!==undefined) b[lp.speciesDiscChoice]++;
    } else if ((sp._discFree||0) > 0) {
      (lp.speciesDiscFree||[]).forEach(k => { if(b[k]!==undefined) b[k]++; });
    }
  }
  if (lp.upbrDisc && b[lp.upbrDisc]!==undefined) b[lp.upbrDisc]++;
  const tr = ACADEMY_TRACKS.find(t => t.name === c._selectedTrack);
  if (tr) {
    Object.entries(tr._disc||{}).forEach(([k,v]) => { if(b[k]!==undefined) b[k]+=v; });
    if (tr._discFreeMode === 'allied') {
      (lp.trackDiscFree2||[]).forEach(k => { if(b[k]!==undefined) b[k]+=2; });
      if (lp.trackDiscFree1 && b[lp.trackDiscFree1]!==undefined) b[lp.trackDiscFree1]++;
    } else if (tr._discFreeMode === 'diplomatic') {
      (lp.trackDiscFree||[]).forEach(k => { if(b[k]!==undefined) b[k]++; });
    }
  }
  return b;
}

// Creation wizard functions
function creationNext() {
  const step=S.char.creationStep||0;
  if(step===CREATION_STEPS.length-1){
    S.char.creationComplete=true;
    S.char.species=S.char._selectedSpecies||S.char.species;
    S.char.era=S.char._selectedEra||S.char.era;
    S.char.upbringing=S.char._selectedUpbringing||S.char.upbringing;
    // Apply all lifepath bonuses
    const attrB=lpAttrBonuses();
    ATTRIBUTES.forEach(a => { S.char[a.key]=Math.min(12,S.char[a.key]+(attrB[a.key]||0)); });
    const discB=lpDiscBonuses();
    DISCIPLINES.forEach(d => { S.char[d.key]=Math.min(5,S.char[d.key]+(discB[d.key]||0)); });
    saveSlot(); renderCurrentTab();
  } else {
    S.char.creationStep=(step+1); saveSlot(); renderCurrentTab();
  }
}
function creationBack() {
  S.char.creationStep=Math.max(0,(S.char.creationStep||0)-1); saveSlot(); renderCurrentTab();
}
function setCreationSpecies(name) { S.char._selectedSpecies=name; saveSlot(); renderCurrentTab(); }
function rollUpbringing() {
  const r=Math.floor(Math.random()*20);
  let up=UPBRINGINGS[UPBRINGINGS.length-1];
  for(const u of UPBRINGINGS){
    const [lo,hi]=(u.d+'-'+u.d).replace(/(\d+)–(\d+)/,'$1-$2').split('-').map(Number);
    if(r+1>=lo&&r+1<=(hi||lo)){up=u;break;}
  }
  S.char._selectedUpbringing=up.name; saveSlot(); renderCurrentTab();
}

  const e=CAREER_EVENTS[Math.floor(Math.random()*CAREER_EVENTS.length)];

      <button class="hud-rec-btn${recOn?' on':''}" id="hud-rec-btn" onclick="toggleHudRec()">${recOn?'⏹ STOP':'⏺ REC SCREEN'}</button>
      <span id="hud-rec-timer">${recOn?timerStr:''}</span>
    </div>
  </div>`;
}

const HUD_LEFT_KEYS = ['stats','sectorMap'];
function toggleHudVis(key) {
  _hudVis[key] = !_hudVis[key];
  // Left-side panels are mutually exclusive — turning one on turns others off
  if (_hudVis[key] && HUD_LEFT_KEYS.includes(key)) {
    HUD_LEFT_KEYS.forEach(k => { if (k !== key) _hudVis[k] = false; });
  }
  hudBroadcast(); refreshHudCtrl();
}
function setHudNpc(idx) { _hudVis.npcSpot = idx; hudBroadcast(); refreshHudCtrl(); }
function setHudCamRes(resH) {
  _hudCamResH = resH;
  localStorage.setItem('stcl-cam-res', resH);
  refreshHudCtrl();
}
async function reacquireCamStream(resH) {
  if (resH) { _hudCamResH = resH; localStorage.setItem('stcl-cam-res', resH); }
  if (window._hudCamStream) { window._hudCamStream.getTracks().forEach(t=>t.stop()); window._hudCamStream=null; }
  const h = _hudCamResH||720, w = h===480?640:h===1080?1920:1280;
  const tries = [
    {video:{width:{ideal:w},height:{ideal:h},frameRate:{ideal:30}},audio:true},
    {video:{width:{ideal:w},height:{ideal:h},frameRate:{ideal:30}},audio:false},
    {video:{width:{ideal:1280},height:{ideal:720},frameRate:{ideal:30}},audio:false},
    {video:true,audio:false}
  ];
  for (const con of tries) {
    try { window._hudCamStream = await navigator.mediaDevices.getUserMedia(con); break; } catch(e) {}
  }
  refreshHudCtrl();
}
function refreshHudCtrl() {
  const wrap = document.getElementById('hud-ctrl-wrap');
  if (wrap && _hudPanelOpen) wrap.innerHTML = buildHudCtrlHTML();
}

async function openHUD() {
  if (_hudChannel) _hudChannel.close();
  _hudChannel = new BroadcastChannel('stcl-hud');

  // Acquire camera in main window FIRST (has established permissions).
  // HUD reads it via window.opener._hudCamStream — must be ready before document.write().
  if (window._hudCamStream) { window._hudCamStream.getTracks().forEach(t => t.stop()); window._hudCamStream = null; }
  const resH = _hudCamResH || 720;
  const resW = resH===480?640:resH===1080?1920:1280;
  const camTries = [
    {video:{width:{ideal:resW},height:{ideal:resH},frameRate:{ideal:30}},audio:true},
    {video:{width:{ideal:resW},height:{ideal:resH},frameRate:{ideal:30}},audio:false},
    {video:{width:{ideal:1280},height:{ideal:720},frameRate:{ideal:30}},audio:false},
    {video:true,audio:false}
  ];
  for (const con of camTries) {
    try { window._hudCamStream = await navigator.mediaDevices.getUserMedia(con); break; } catch(e) {}
  }

  _hudWin = window.open('', 'stcl-hud', 'width=1280,height=720,menubar=no,toolbar=no,location=no,status=no');
  if (!_hudWin) { alert('Pop-up blocked — please allow pop-ups for this page.'); return; }
  _hudWin.document.open();
  _hudWin.document.write(buildHUDHtml());
  _hudWin.document.close();
  setTimeout(() => hudBroadcast(), 400);
  setTimeout(() => hudBroadcast(), 1000);
}

function hudBroadcast(extra) {
  if (!_hudChannel) return;
  const c = S.char || {};
  const sh = S.ship || {};
  const isCreating = !c.creationComplete;
  _hudChannel.postMessage({
    type: 'state',
    char: isCreating ? null : {
      name: c.name, rank: c.rank, species: c.species, era: c.era, assignment: c.assignment,
      control: c.control, daring: c.daring, fitness: c.fitness,
      insight: c.insight, presence: c.presence, reason: c.reason,
      command: c.command, conn: c.conn, security: c.security,
      engineering: c.engineering, science: c.science, medicine: c.medicine,
      determination: c.determination, momentum: c.momentum, threat: c.threat,
      values: c.values, focuses: c.focuses
    },
    creation: isCreating ? {
      step: c.creationStep || 0,
      species: c._selectedSpecies || '',
      era: c._selectedEra || '',
      env: c._selectedEnv || '',
      upbringing: c._selectedUpbringing || '',
      track: c._selectedTrack || '',
      careerEvent: c.careerEvent || '',
      focuses: c.focuses || [],
      name: c.name || '',
      rank: c.rank || '',
    } : null,
    ship: {
      name: sh.name, className: sh.className, scale: sh.scale,
      comms: sh.comms, computers: sh.computers, engines: sh.engines,
      sensors: sh.sensors, structure: sh.structure, weapons: sh.weapons,
      command: sh.command, conn: sh.conn, security: sh.security,
      engineering: sh.engineering, science: sh.science, medicine: sh.medicine
    },
    sectorMap: (() => { const sec = S.sectors[S.activeSector] || {}; return { name: sec.name, currentCell: sec.currentCell, cells: (sec.cells||[]).map(c=>({name:c.name, icon:c.icon, isVoid:c.isVoid})) }; })(),
    interiorMap: { cells: (sh.interiorCells||[]).map(c=>({name:c.name, icon:c.icon, isVoid:c.isVoid})) },
    npcs: S.npcs || [],
    encounter: S.combatEnemies || [],
    dice: _lastRollData,
    log: (S.log || []).slice(-3).reverse(),
    vis: _hudVis,
    ...(extra || {})
  });
}

    <div id="h-log-content"><span class="sml">No entries</span></div>
  </div>
  <div id="h-enc-section">
    <div class="sec-div"></div>
    <div class="sec-lbl" style="color:#CC3300">Active Encounter</div>
    <div id="h-enc-content"><span class="sml">No active encounter</span></div>
  </div>
</div>

<!-- NPC SPOTLIGHT — floating center popup -->
<div id="p-spotlight" class="panel" style="display:none">
  <div class="ph lav">NPC Spotlight</div>

  <div id="h-spot-notes" style="font-size:10px;color:#9a6a3a;margin-top:8px;overflow:hidden;display:-webkit-box;-webkit-line-clamp:4;-webkit-box-orient:vertical"></div>

<div id="p-sector" class="panel" style="display:none">
