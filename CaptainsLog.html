<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Star Trek: Captain's Log</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Antonio:wght@400;700&display=swap');
:root {
  --bg: #000000;
  --surface: #0d0500;
  --surface2: #150800;
  --surface3: #1e0d00;
  --accent: #FF9900;
  --accent-dim: #7a3f00;
  --accent-glow: rgba(255,153,0,0.14);
  --text: #FFCC99;
  --muted: #7a4a1a;
  --border: #2a1200;
  --danger: #FF2200;
  --warning: #FFCC00;
  --info: #99CCFF;
  --success: #66CC66;
  --font: 'Antonio', 'Arial Narrow', Arial, sans-serif;
  --lcars-orange: #FF9900;
  --lcars-peach: #FF9966;
  --lcars-lavender: #CC99FF;
  --lcars-blue: #9999FF;
  --lcars-ltblue: #99CCFF;
  --lcars-gold: #FFCC99;
}
*{box-sizing:border-box;margin:0;padding:0}
html{touch-action:manipulation}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;letter-spacing:0.5px}
body.red-alert{--accent:#CC0000;--accent-dim:#5a0000;--accent-glow:rgba(204,0,0,0.18);--text:#FFAAAA;--muted:#6a2020;--border:#2a0a0a;--surface:#0d0000;--surface2:#150000;--surface3:#1e0000}
.ship-detail-panel{margin-top:10px;background:var(--surface2);border-left:4px solid var(--accent);border-radius:0 8px 8px 0;padding:14px;animation:fadeIn 0.15s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
button{font-family:var(--font);cursor:pointer}
input,select,textarea{font-family:var(--font)}

/* ── Layout ── */
#app{display:flex;flex-direction:column;min-height:100vh}
#slot-bar{background:var(--accent);padding:0 12px;display:flex;gap:8px;align-items:center;flex-wrap:wrap;min-height:46px}
#slot-bar h1{font-size:14px;color:#000;letter-spacing:4px;text-transform:uppercase;margin-right:8px;white-space:nowrap;font-weight:700}
.slot-btn{background:#000;border:none;color:var(--accent);padding:6px 18px;font-size:11px;border-radius:50vh;transition:all 0.15s;white-space:nowrap;min-width:80px;text-align:center;text-transform:uppercase;letter-spacing:1px;font-weight:700;font-family:var(--font)}
.slot-btn.active{background:var(--lcars-lavender);color:#000}
.slot-btn:hover{background:var(--lcars-gold);color:#000}

#main-layout{display:flex;flex:1;overflow:hidden}

/* ── LCARS Sidebar ── */
#nav{background:#000;display:flex;flex-direction:column;width:108px;flex-shrink:0}
#nav::before{content:'';display:block;background:var(--accent);height:72px;border-radius:0 0 36px 0;margin-bottom:8px;flex-shrink:0}
.nav-btn{background:var(--accent);border:none;color:#000;padding:10px 8px 10px 14px;text-align:left;font-size:11px;letter-spacing:1px;text-transform:uppercase;transition:all 0.15s;white-space:nowrap;font-weight:700;border-radius:0 50vh 50vh 0;margin:2px 8px 2px 0;font-family:var(--font)}
.nav-btn:hover{filter:brightness(1.2)}
.nav-btn.active{background:#fff !important;color:#000 !important}
#nav-character{background:#FF9900}
#nav-map{background:#FF9966}
#nav-npcs{background:#CC99FF}
#nav-dice{background:#9999FF}
#nav-oracle{background:#99CCFF}
#nav-log{background:#FFCC99}

#content{flex:1;overflow-y:auto;padding:14px 16px 14px 10px}

@media(max-width:767px){
  #nav{position:fixed;bottom:0;left:0;right:0;width:100%;flex-direction:row;border-top:4px solid var(--accent);z-index:100;height:52px;background:#000}
  #nav::before{display:none}
  .nav-btn{flex:1;border-radius:0;margin:0;padding:2px;text-align:center;font-size:9px;height:100%;display:flex;align-items:center;justify-content:center;letter-spacing:0.5px}
  #content{padding-bottom:68px;padding-left:10px;padding-right:10px}
  #slot-bar h1{display:none}
}

/* ── Cards ── */
.card{background:#000;border:none;border-left:6px solid var(--accent);border-radius:0 8px 8px 0;padding:14px;margin-bottom:14px;overflow:visible}
.card-title{background:var(--accent);color:#000;font-size:11px;font-weight:700;letter-spacing:3px;text-transform:uppercase;margin:-14px -14px 14px -8px;padding:5px 14px;border-bottom:none}
.section-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:10px}

/* ── Forms ── */
.field{margin-bottom:10px}
.field label{display:block;font-size:10px;color:var(--lcars-lavender);letter-spacing:2px;text-transform:uppercase;margin-bottom:3px;font-weight:700}
.field input,.field select,.field textarea{width:100%;background:#000;border:2px solid var(--accent-dim);color:var(--text);padding:6px 10px;border-radius:4px;font-size:13px}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--accent)}
.field textarea{resize:vertical;min-height:60px}
.field select option{background:#000}

/* ── Buttons ── */
.btn{display:inline-block;background:var(--accent);border:none;color:#000;padding:7px 18px;border-radius:50vh;font-size:11px;cursor:pointer;transition:all 0.15s;letter-spacing:1px;text-transform:uppercase;font-weight:700;font-family:var(--font)}
.btn:hover{filter:brightness(1.15)}
.btn-accent{background:var(--lcars-lavender);color:#000}
.btn-accent:hover{background:var(--lcars-blue);color:#000}
.btn-danger{background:#880000;color:#FF9999;border:none}
.btn-danger:hover{background:var(--danger);color:#fff}
.btn-sm{padding:4px 14px;font-size:10px}
.btn-xs{padding:2px 10px;font-size:9px}

/* ── Attribute boxes ── */
.attr-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:6px;margin-bottom:10px}
@media(max-width:600px){.attr-grid{grid-template-columns:repeat(3,1fr)}}
.attr-box{background:#000;border:2px solid var(--accent);border-radius:6px;padding:8px 4px;text-align:center}
.attr-box .attr-abbr{display:none}
.attr-box .attr-val{font-size:28px;color:var(--accent);font-weight:700;line-height:1.1}
.attr-box .attr-full{font-size:11px;color:var(--text);margin-top:4px;text-transform:uppercase;letter-spacing:1px;font-weight:700}
.attr-box .res-btn{width:28px;height:28px;font-size:18px}

/* ── Discipline dots ── */
.disc-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px;margin-bottom:10px}
@media(max-width:500px){.disc-grid{grid-template-columns:1fr}}
.disc-row{display:flex;align-items:center;gap:6px;padding:4px 6px;border-radius:3px;border:1px solid transparent}
.disc-name{flex:1;font-size:11px;text-transform:uppercase;letter-spacing:0.5px}
.disc-dots{display:flex;gap:3px}
.dot{width:14px;height:14px;border-radius:50%;background:#000;border:2px solid var(--muted);cursor:pointer;transition:all 0.2s}
.dot.filled{background:var(--accent);border-color:var(--accent)}

/* ── Stress circles ── */
.stress-track{display:flex;gap:4px;flex-wrap:wrap;align-items:center}
.stress-circle{width:24px;height:24px;border-radius:50%;background:#000;border:2px solid var(--muted);cursor:pointer;transition:all 0.2s}
.stress-circle.hit{background:var(--danger);border-color:var(--danger)}
.stress-circle.warn{background:var(--warning);border-color:var(--warning)}
.track-label{font-size:10px;color:var(--muted);margin-right:4px;min-width:30px}

/* ── Determination dots ── */
.det-dot{width:20px;height:20px;border-radius:50%;background:#000;border:2px solid var(--muted);cursor:pointer;display:inline-block;transition:all 0.2s;margin-right:4px}
.det-dot.filled{background:var(--lcars-ltblue);border-color:var(--lcars-ltblue)}

/* ── Resource counters ── */
.res-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:8px}
.res-item{display:flex;flex-direction:column;align-items:center;background:#000;border:2px solid var(--accent);border-radius:8px;padding:6px 14px;min-width:70px}
.res-item .res-label{font-size:9px;color:var(--lcars-lavender);letter-spacing:2px;text-transform:uppercase;font-weight:700}
.res-item .res-val{font-size:26px;color:var(--accent);font-weight:700}
.res-btns{display:flex;gap:4px;margin-top:2px}
.res-btn{background:var(--accent);border:none;color:#000;width:22px;height:22px;border-radius:50%;font-size:14px;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center;font-weight:700;transition:all 0.15s}
.res-btn:hover{background:var(--lcars-peach)}

/* ── Values ── */
.value-row{display:flex;gap:6px;align-items:center;margin-bottom:6px}
.value-input{flex:1;background:#000;border:2px solid var(--accent-dim);color:var(--text);padding:5px 10px;border-radius:50vh;font-size:12px}
.value-toggle{font-size:9px;padding:3px 10px;border:none;background:var(--accent);color:#000;border-radius:50vh;cursor:pointer;white-space:nowrap;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;transition:all 0.15s}
.value-toggle.used{background:var(--lcars-lavender)}
.value-toggle.challenged{background:var(--danger);color:#fff;text-decoration:line-through}

/* ── Sector Map ── */
#map-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:4px;width:100%;max-width:440px;margin:0 auto 14px}
.map-cell{aspect-ratio:1;background:#000;border:2px solid var(--border);border-radius:4px;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:10px;position:relative;transition:all 0.2s;overflow:hidden}
@media(max-width:480px){.cell-icon{font-size:14px}.cell-name{font-size:7px}}
.map-cell:hover{border-color:var(--accent-dim)}
.map-cell.current{border-color:var(--accent);box-shadow:0 0 10px rgba(255,153,0,0.5)}
.map-cell.explored{background:#0d0500}
.map-cell.unexplored{opacity:0.35}
.map-cell.adjacent{border-color:var(--lcars-ltblue)}
.map-cell.void{background:#000;border:2px dashed #1a0800;cursor:default}
.map-cell.void:hover{border-color:#1a0800}
.cell-num{color:var(--muted);font-size:9px;position:absolute;top:2px;left:4px}
.cell-icon{font-size:18px}
.cell-name{font-size:8px;color:var(--lcars-peach);text-align:center;padding:0 2px;max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-transform:uppercase;letter-spacing:0.5px}

/* ── NPC cards ── */
.npc-card{background:#000;border:2px solid var(--accent-dim);border-radius:0 8px 8px 0;border-left:6px solid var(--lcars-lavender);margin-bottom:8px;overflow:hidden}
.npc-header{display:flex;align-items:center;gap:8px;padding:8px 12px;cursor:pointer;background:var(--surface);border-bottom:1px solid var(--border)}
.npc-header:hover{background:var(--surface2)}
.npc-name-label{flex:1;font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:1px}
.npc-faction{font-size:9px;color:#000;padding:2px 8px;background:var(--lcars-lavender);border-radius:50vh;font-weight:700;letter-spacing:1px;text-transform:uppercase}
.npc-body{padding:12px;display:none}
.npc-body.open{display:block}
.attitude-badge{display:inline-block;padding:2px 10px;border-radius:50vh;font-size:9px;letter-spacing:1px;text-transform:uppercase;font-weight:700}
.att-hostile{background:var(--danger);color:#fff}
.att-suspicious{background:var(--warning);color:#000}
.att-neutral{background:var(--muted);color:#fff}
.att-friendly{background:var(--success);color:#000}
.att-allied{background:var(--accent);color:#000}

/* ── Oracle ── */
.oracle-card{background:#000;border:2px solid var(--accent);border-radius:0 8px 8px 0;border-left:6px solid var(--accent);padding:16px;text-align:center;margin-bottom:12px}
.oracle-result{font-size:36px;font-weight:700;margin:10px 0;min-height:40px;text-transform:uppercase;letter-spacing:4px}
.oracle-result.yes{color:var(--success)}
.oracle-result.yes-twist{color:var(--warning)}
.oracle-result.no{color:var(--danger)}
.oracle-result.no-twist{color:var(--lcars-ltblue)}
.oracle-detail{font-size:12px;color:var(--muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:1px}
.dice-result-row{display:flex;gap:8px;justify-content:center;margin:8px 0;flex-wrap:wrap}
.die-result{width:46px;height:46px;border:3px solid var(--border);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700}
.die-result.success{border-color:var(--accent);color:var(--accent);background:rgba(255,153,0,0.1)}
.die-result.critical{border-color:var(--success);color:var(--success);background:rgba(102,204,102,0.1)}
.die-result.complication{border-color:var(--danger);color:var(--danger);background:rgba(255,34,0,0.08)}
.die-result.fail{color:var(--muted)}

/* ── Log/Journal ── */
.log-entry-major{background:#000;border-left:6px solid var(--accent);border-radius:0 8px 8px 0;padding:14px 14px 14px 16px;margin-bottom:12px}
.log-entry-supplemental{background:#000;border-left:4px solid var(--lcars-ltblue);border-radius:0 6px 6px 0;padding:10px 12px 10px 14px;margin-bottom:8px;margin-left:12px}
.log-entry-alert{background:rgba(255,34,0,0.05);border-left:4px solid var(--danger);border-radius:0 6px 6px 0;padding:10px 12px 10px 14px;margin-bottom:8px;margin-left:12px}
.log-entry-base{background:#000;border-left:3px solid var(--border);border-radius:0 4px 4px 0;padding:8px 10px 8px 12px;margin-bottom:6px;margin-left:24px}

/* ── Roll table ── */
.roll-table{width:100%;border-collapse:collapse;font-size:11px;margin-bottom:8px}
.roll-table th{background:var(--accent);color:#000;padding:5px 8px;text-align:left;letter-spacing:2px;text-transform:uppercase;font-size:10px;font-weight:700}
.roll-table td{padding:5px 8px;border-bottom:1px solid var(--border);vertical-align:top}
.roll-table tr:hover td{background:var(--surface)}
.roll-table tr.selected td{background:rgba(255,153,0,0.1);border-color:var(--accent-dim)}

/* ── Wizard ── */
.wizard-progress{display:flex;gap:4px;margin-bottom:16px;flex-wrap:wrap}
.wizard-step{flex:1;height:6px;background:var(--surface3);border-radius:50vh;min-width:16px}
.wizard-step.done{background:var(--accent-dim)}
.wizard-step.active{background:var(--accent)}
.wizard-nav{display:flex;gap:10px;margin-top:16px}

/* ── Inner tabs ── */
.inner-tabs{display:flex;gap:6px;border-bottom:none;margin-bottom:12px}
.inner-tab{background:var(--surface3);border:none;color:var(--muted);padding:6px 16px;font-size:11px;letter-spacing:2px;text-transform:uppercase;cursor:pointer;border-radius:50vh;font-weight:700;font-family:var(--font);transition:all 0.15s}
.inner-tab.active{background:var(--accent);color:#000}

/* ── Collapsible ── */
.collapsible-header{display:flex;justify-content:space-between;align-items:center;cursor:pointer;padding:6px 0;border-bottom:1px solid var(--accent-dim)}
.collapsible-header:hover{color:var(--accent)}
.collapse-icon{font-size:10px;color:var(--muted)}
.collapsible-body{display:none;padding-top:10px}
.collapsible-body.open{display:block}

/* ── Modal ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.92);z-index:200;display:flex;align-items:center;justify-content:center;padding:16px}
.modal{background:#000;border:none;border-top:6px solid var(--accent);border-left:6px solid var(--accent);border-radius:0 10px 10px 0;padding:20px;max-width:520px;width:100%;max-height:85vh;overflow-y:auto}
.modal h2{color:var(--accent);font-size:15px;letter-spacing:4px;text-transform:uppercase;margin-bottom:14px;font-weight:700}

/* ── FAB ── */
.fab{position:fixed;bottom:70px;right:16px;width:54px;height:54px;border-radius:50%;background:var(--accent);border:none;color:#000;font-size:28px;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:50;box-shadow:0 2px 16px rgba(255,153,0,0.5);font-weight:700;transition:all 0.15s}
.fab:hover{background:var(--lcars-peach)}
@media(min-width:768px){.fab{bottom:16px}}

/* ── Misc ── */
.header-title{font-size:15px;font-weight:700;color:var(--accent);letter-spacing:4px;text-transform:uppercase}
.glow{text-shadow:0 0 12px rgba(255,153,0,0.7)}
.hidden{display:none!important}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:#000}
::-webkit-scrollbar-thumb{background:var(--accent-dim);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--accent)}
.gear-list{list-style:none}
.gear-item{display:flex;gap:8px;align-items:center;padding:5px 0;border-bottom:1px solid var(--border);font-size:12px;text-transform:uppercase;letter-spacing:0.5px}
.gear-item:last-child{border-bottom:none}
.gear-item .gear-name{flex:1}
.perk-item{padding:5px 10px;border:none;background:var(--surface);border-left:4px solid var(--lcars-lavender);margin-bottom:4px;font-size:11px;text-transform:uppercase;letter-spacing:0.5px}
.perk-name{color:var(--accent);font-weight:700}
.filter-btn{padding:4px 12px;font-size:10px;border:none;background:var(--surface3);color:var(--muted);border-radius:50vh;cursor:pointer;text-transform:uppercase;letter-spacing:1px;font-weight:700;font-family:var(--font);transition:all 0.15s}
.filter-btn.active{background:var(--accent);color:#000}

/* ── HUD Control Panel ── */
#hud-ctrl-wrap{position:fixed;bottom:64px;left:0;z-index:300;display:none}
@media(min-width:768px){#hud-ctrl-wrap{display:block}}
#hud-ctrl-panel{background:rgba(0,0,0,.94);border:2px solid var(--accent);border-left:none;border-radius:0 10px 10px 0;padding:10px 14px 12px 10px;min-width:210px}
.hc-title{font-size:10px;color:var(--accent);letter-spacing:3px;font-weight:700;text-transform:uppercase;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center}
.hc-section{margin-bottom:8px}
.hc-label{font-size:9px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:4px;font-weight:700}
.hc-chips{display:flex;flex-wrap:wrap;gap:4px}
.hc-chip{padding:3px 10px;font-size:10px;border:1px solid var(--border);background:none;color:var(--muted);border-radius:50vh;cursor:pointer;font-family:var(--font);text-transform:uppercase;letter-spacing:1px;transition:all 0.15s;font-weight:700}
.hc-chip.on{background:var(--accent);border-color:var(--accent);color:#000}
.hc-chip:hover{border-color:var(--accent-dim);color:var(--text)}
.hud-open-btn{display:flex;align-items:center;gap:6px;background:var(--accent);border:none;color:#000;padding:5px 14px;border-radius:0 50vh 50vh 0;font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;cursor:pointer;font-family:var(--font);transition:all 0.15s;margin-top:8px;width:100%}
.hud-open-btn:hover{background:var(--lcars-peach)}
.hud-rec-row{display:flex;align-items:center;gap:8px;margin-top:8px}
.hud-rec-btn{background:#660000;border:none;color:#FF9999;padding:4px 12px;border-radius:50vh;font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;cursor:pointer;font-family:var(--font);transition:all 0.15s}
.hud-rec-btn.on{background:#CC0000;color:#fff;animation:recPulse 1.4s infinite}
.hud-rec-btn:hover{background:#990000;color:#fff}
#hud-rec-timer{font-size:10px;color:#FF4444;min-width:44px;font-family:var(--font);letter-spacing:1px}
@keyframes recPulse{0%,100%{box-shadow:0 0 0 0 rgba(204,0,0,.6)}50%{box-shadow:0 0 0 6px rgba(204,0,0,0)}}
</style>
</head>
<body>
<div id="app">
  <div id="slot-bar">
    <h1>CAPTAIN'S LOG //</h1>
    <button class="slot-btn" id="slot0" onclick="selectSlot(0)">MISSION 1</button>
    <button class="slot-btn" id="slot1" onclick="selectSlot(1)">MISSION 2</button>
    <button class="slot-btn" id="slot2" onclick="selectSlot(2)">MISSION 3</button>
    <div style="display:flex;gap:4px;margin-left:auto">
      <button class="btn btn-sm" onclick="exportToFile()" title="Save all missions to a file">SAVE FILE</button>
      <button class="btn btn-sm" onclick="importFromFile()" title="Load missions from a file">LOAD FILE</button>
      <button class="btn btn-sm" onclick="toggleHudPanel()" id="hud-toggle-btn" title="Stream HUD controls" style="display:none">HUD</button>
      <button class="btn btn-sm" onclick="toggleRedAlert()" id="red-alert-btn" title="Toggle Red Alert night mode">🔴</button>
      <button class="btn btn-sm" onclick="openSlotModal()">⚙</button>
    </div>
  </div>
  <div id="main-layout">
    <nav id="nav">
      <button class="nav-btn active" onclick="showTab('character')" id="nav-character">OFFICER</button>
      <button class="nav-btn" onclick="showTab('map')" id="nav-map">MAP</button>
      <button class="nav-btn" onclick="showTab('npcs')" id="nav-npcs">NPCS</button>
      <button class="nav-btn" onclick="showTab('dice')" id="nav-dice">DICE</button>
      <button class="nav-btn" onclick="showTab('oracle')" id="nav-oracle">ORACLE</button>
      <button class="nav-btn" onclick="showTab('log')" id="nav-log">LOG</button>
    </nav>
    <main id="content"></main>
  </div>
</div>

<div class="modal-overlay hidden" id="modal-overlay" onclick="closeModal(event)">
  <div class="modal" id="modal-body"></div>
</div>

<script>
// ============================================================
// GAME DATA
// ============================================================

  {name:"Constitution (2260s)",era:"Original Series",scale:4,comms:8,computers:8,engines:8,sensors:8,structure:7,weapons:7,command:3,conn:2,security:3,engineering:2,science:3,medicine:2,talent:"",thumb:"shipthumbs/shipthumb_18.png",trait:"A heavy cruiser, the Constitution was designed for 5 year missions in deep space. With robust capabilities and facilities on-board, the Constitution could operate alone for long periods, without additional Starfleet support."},

  {name:"Excelsior",era:"Original Series",scale:5,comms:8,computers:8,engines:10,sensors:10,structure:9,weapons:8,command:4,conn:1,security:2,engineering:4,science:2,medicine:2,talent:"",thumb:"shipthumbs/shipthumb_20.png",trait:"As one of the most heavily used space frames across the Federation, the Excelsior is adaptable, agile, and formidable. With a start in the late 23rd century, many refits would let the Excelsior class see service into the mid 2400s."},

  {name:"Challenger",era:"Original Series",scale:4,comms:8,computers:10,engines:12,sensors:11,structure:9,weapons:8,command:1,conn:3,security:2,engineering:4,science:3,medicine:2,talent:"",thumb:"shipthumbs/shipthumb_23.png",trait:"The Challenger was an attempt at a sleek space frame that created a less-damaging warp field. The result was a fast ship that was easy to repair, albeit without some of the bells and whistles of larger vessels."},
  {name:"Springfield",era:"Golden Age",scale:4,comms:10,computers:10,engines:10,sensors:12,structure:8,weapons:8,command:2,conn:2,security:3,engineering:3,science:2,medicine:2,talent:"",thumb:"shipthumbs/shipthumb_24.png",trait:"With a series of modular pods, the Springfield was popular for new member worlds to use. With plenty of space, competent sensors and weapons, these light frigates were popular throughout the mid 24th century."},
  {name:"New Orleans",era:"Golden Age",scale:4,comms:10,computers:10,engines:10,sensors:10,structure:9,weapons:8,command:2,conn:3,security:1,engineering:4,science:4,medicine:2,talent:"",thumb:"shipthumbs/shipthumb_25.png",trait:"A counterpart to its larger Galaxy and Nebula sisters, the New Orleans class was designed with external mission pods to rapidly change missions without extensive refits."},

  {name:"Olympic",era:"Golden Age",scale:4,comms:10,computers:11,engines:10,sensors:11,structure:9,weapons:7,command:2,conn:2,security:2,engineering:1,science:3,medicine:5,talent:"",thumb:"shipthumbs/shipthumb_27.png",trait:"Equipped with extensive medical, rehabilitation, and emergency facilities, the Olympic class was built exclusively for humanitarian efforts. While not heavily armed or armored, the ship was crucial wide-scale disasters."},
  {name:"California",era:"Golden Age",scale:4,comms:10,computers:10,engines:8,sensors:9,structure:10,weapons:8,command:2,conn:2,security:2,engineering:3,science:3,medicine:3,talent:"",thumb:"shipthumbs/shipthumb_28.png",trait:"A workhorse of the federation, the Cali class was designed for 2nd Contact, and included crew and facilities to cater to those diplomatic/engineering duties."},
  {name:"Parliament",era:"Golden Age",scale:5,comms:9,computers:9,engines:11,sensors:10,structure:11,weapons:9,command:3,conn:2,security:2,engineering:4,science:2,medicine:2,talent:"",thumb:"shipthumbs/shipthumb_29.png",trait:"A precursor to the Luna, the Parliament class was designed with extensive engineering facilities. Aside from the ability to do routine exploration, the Parliaments could service other ships and build large facilities."},
  {name:"Galaxy",era:"Next Generation",scale:6,comms:9,computers:11,engines:10,sensors:10,structure:10,weapons:10,command:3,conn:2,security:2,engineering:2,science:3,medicine:3,talent:"",thumb:"shipthumbs/shipthumb_30.png",trait:"A capital ship class, the corps of engineers harnessed all the best technologies of the era and implemented them into the Galaxy. Massive, modular, and adaptive, the ship housed Starfleet personnel and civilians."},
  {name:"Nebula",era:"Next Generation",scale:5,comms:11,computers:11,engines:10,sensors:8,structure:9,weapons:9,command:4,conn:1,security:2,engineering:4,science:2,medicine:2,talent:"",thumb:"shipthumbs/shipthumb_31.png",trait:"With a hot-swappable mission pod, the Nebula could adapt to various scientific roles without a more complex, time-intensive refit. This proved valuable during the Dominion War, when the mission pod saw combat adaptations."},
  {name:"Nova",era:"Next Generation",scale:3,comms:10,computers:10,engines:10,sensors:10,structure:8,weapons:8,command:2,conn:2,security:2,engineering:2,science:4,medicine:3,talent:"",thumb:"shipthumbs/shipthumb_32.png",trait:"The Nova was a compact vessel designed for short range scientific missions. The study of planetary surveys, local phenomenon, and other \"backyard\" curiosities were the primary focus of these smaller vessels."},
  {name:"Norway",era:"Next Generation",scale:4,comms:9,computers:9,engines:10,sensors:11,structure:10,weapons:9,command:2,conn:2,security:2,engineering:3,science:2,medicine:4,talent:"",thumb:"shipthumbs/shipthumb_33.png",trait:"The Battle of Wolf 359 was a wake up for Starfleet in many ways, including their lack of vessels that were capable of rapid medical response. Enter the Norway, a vessel with a slim profile and extensive shuttle/medical bays, ready to ferry the wounded."},
  {name:"Defiant",era:"Next Generation",scale:3,comms:9,computers:9,engines:8,sensors:9,structure:8,weapons:13,command:2,conn:3,security:5,engineering:2,science:1,medicine:2,talent:"",thumb:"shipthumbs/shipthumb_34.png",trait:"Coming out of the Golden Age of the Federation, the Defiant was an early attempt to yet-again produce ships without families or research support on-board. In effect, it was a pair of warp nacelles with cannons strapped on."},

  {name:"Akira",era:"Next Generation",scale:5,comms:9,computers:9,engines:10,sensors:10,structure:10,weapons:11,command:3,conn:1,security:4,engineering:2,science:2,medicine:3,talent:"",thumb:"shipthumbs/shipthumb_37.png",trait:"A functional \"aircraft carrier\" of the era, the Akira class is a battleship, carrier, yet still can perform many research and exploration duties. This makes it a great vessel for patrol and defense."},
  {name:"Saber",era:"Next Generation",scale:3,comms:10,computers:9,engines:11,sensors:10,structure:9,weapons:9,command:2,conn:4,security:4,engineering:2,science:1,medicine:2,talent:"",thumb:"shipthumbs/shipthumb_38.png",trait:"As the name implies, the saber is a weapon. With a small crew and heavy weapons, the Saber is primarily used to shore up border defenses, piracy, and other missions where 'diplomacy' won't do."},
  {name:"Sovereign",era:"Next Generation",scale:6,comms:10,computers:9,engines:10,sensors:10,structure:9,weapons:10,command:4,conn:1,security:3,engineering:2,science:3,medicine:2,talent:"",thumb:"shipthumbs/shipthumb_39.png",trait:"With additional threats to the Federation, the Sovereign class was designed with a keen eye on defense. Gone are many of the comforts of the golden age of exploration, like family support, now replaced with weaponry."},
  {name:"Luna",era:"Next Generation",scale:5,comms:10,computers:10,engines:10,sensors:12,structure:8,weapons:8,command:2,conn:2,security:2,engineering:3,science:4,medicine:2,talent:"",thumb:"shipthumbs/shipthumb_40.png",trait:"Originally designed to explore the Gamma Quadrant, the Luna class designed with more extensive research facilities than the Intrepid. The vessel was also fitted with a modular mission pod, so that it would be better suited for various tasks."},
  {name:"Prometheus",era:"Next Generation",scale:4,comms:9,computers:9,engines:10,sensors:9,structure:10,weapons:12,command:3,conn:1,security:4,engineering:3,science:2,medicine:2,talent:"",thumb:"shipthumbs/shipthumb_41.png",trait:"Designed for deep space tactical responses, the Prometheus took saucer separation to a new level by splitting into three sections. Heavily armed, the vessel sections are networked and can stand against far superior foes."},
  {name:"Ross",era:"Next Generation",scale:6,comms:10,computers:10,engines:11,sensors:10,structure:10,weapons:9,command:2,conn:2,security:2,engineering:3,science:3,medicine:3,talent:"",thumb:"shipthumbs/shipthumb_42.png",trait:"An update of the Galaxy class, the Ross class brought in several new technologies refined in other ships, particularly the Sovereign."},
  {name:"Vesta",era:"Next Generation",scale:6,comms:10,computers:12,engines:12,sensors:9,structure:9,weapons:9,command:2,conn:3,security:2,engineering:3,science:3,medicine:2,talent:"",thumb:"shipthumbs/shipthumb_43.png",trait:"Fitted with the new, experimental Quantum Slipstream Technology, Vesta space frames were designed as test beds for several new technologies that would define the era. They were charged with deep space exploration missions at the very edge of Federation space."},
  {name:"Protostar",era:"Next Generation",scale:3,comms:10,computers:10,engines:13,sensors:10,structure:10,weapons:9,command:2,conn:3,security:2,engineering:4,science:2,medicine:2,talent:"",thumb:"shipthumbs/shipthumb_44.png",trait:"Designed to test an experimental new type of FTL transport, the Protostar harnessed the power of a small protostar, using the energy to propel it to faster than light speeds."},
  {name:"Excalibur",era:"Picard Era",scale:4,comms:9,computers:9,engines:10,sensors:9,structure:11,weapons:9,command:3,conn:2,security:2,engineering:3,science:3,medicine:2,talent:"",thumb:"shipthumbs/shipthumb_45.png",trait:"An update of the Constitution class, the Excalibur capitalized on extensive cargo holds. She became a workhorse of transport and colonization, able to carry supplies great distances."},
  {name:"Reliant",era:"Picard Era",scale:4,comms:10,computers:11,engines:10,sensors:10,structure:10,weapons:10,command:4,conn:3,security:2,engineering:1,science:2,medicine:3,talent:"",thumb:"shipthumbs/shipthumb_46.png",trait:"An update of the Miranda class, the Reliant was designed as a support and logistical backbone for the fleet. Adaptable and versatile, these ships filled various roles."},
  {name:"Sutherland",era:"Picard Era",scale:5,comms:11,computers:11,engines:10,sensors:14,structure:10,weapons:10,command:2,conn:2,security:2,engineering:4,science:3,medicine:2,talent:"",thumb:"shipthumbs/shipthumb_47.png",trait:"An update of the Nebula class, the Sutherland features the easily-replaceable mission pod on the dorsal section of the ship. However, instead of a refit, the Sutherland's frame and components have been rebuilt from the ground up, carrying on the spirit of the Nebula into the 25th century."},
  {name:"Odyssey",era:"Picard Era",scale:7,comms:10,computers:11,engines:10,sensors:10,structure:11,weapons:10,command:3,conn:2,security:4,engineering:3,science:2,medicine:2,talent:"",thumb:"shipthumbs/shipthumb_48.png",trait:"As the latest capital ship, many lessons learned from previous galactic contests were integrated into the Odyssey construction, including the Aquarius class escort embedded in the rear of the ship."},
  {name:"Aquarius Class",era:"Picard Era",scale:2,comms:9,computers:9,engines:8,sensors:9,structure:8,weapons:11,command:2,conn:3,security:3,engineering:2,science:2,medicine:2,talent:"",thumb:"shipthumbs/shipthumb_49.png",trait:"Half the size of the Defiant class, the Aquarius was designed as a warp-capable, light duty vessel. With recon and defense capabilities, it could operate autonomously from a parent ship for short durations. This was effective, particularly in deep space."},
  {name:"Inquiry Class",era:"Picard Era",scale:5,comms:10,computers:10,engines:10,sensors:11,structure:10,weapons:9,command:4,conn:2,security:2,engineering:2,science:3,medicine:2,talent:"",thumb:"shipthumbs/shipthumb_50.png",trait:"Ablative armor and limited nanite repairs are just two of the features that separate the Inquiry from many of its sister ships. These designs made the space frame more adaptive to different situations, including conflicts developing across the quadrant."},
  {name:"Gagarin",era:"Picard Era",scale:5,comms:9,computers:9,engines:12,sensors:10,structure:9,weapons:12,command:2,conn:3,security:4,engineering:3,science:1,medicine:2,talent:"",thumb:"shipthumbs/shipthumb_51.png",trait:"With a series of advanced EPS routing systems, many fed directly into the phaser systems, the Gagarin class utilized high speed, strength, and sensors."},
  {name:"Earhart",era:"Picard Era",scale:5,comms:11,computers:10,engines:12,sensors:9,structure:10,weapons:10,command:2,conn:3,security:2,engineering:2,science:2,medicine:4,talent:"",thumb:"shipthumbs/shipthumb_52.png",trait:"With a hangar spread throughout her midship, the Earhart could rapidly warp in and deploy small craft, from cargo shuttles to Peregrine fighters. As a strike wing craft, the Earhart built off the successes of the Engle class."},
  {name:"Nobel",era:"Picard Era",scale:4,comms:10,computers:12,engines:10,sensors:11,structure:10,weapons:9,command:3,conn:2,security:3,engineering:1,science:3,medicine:4,talent:"",thumb:"shipthumbs/shipthumb_53.png",trait:"An evolution of the Olympic Class, the Nobel was designed after the Mars attacks in 2399. With this class, the sphere was designed to detach from the hull, to exist is a short-term stationary facility."},
  {name:"Chimera",era:"Picard Era",scale:5,comms:10,computers:9,engines:10,sensors:10,structure:11,weapons:12,command:3,conn:2,security:4,engineering:2,science:2,medicine:2,talent:"",thumb:"shipthumbs/shipthumb_54.png",trait:"With designs starting in 2405, Starfleet wished to create a powerhouse escort that could compete with Klingon birds of prey. The result was the Chimera, a vessel that blended many designs to create a deadly combination."},
  {name:"Jupiter Carrier",era:"Star Trek Online (2409-2411)",scale:8,comms:11,computers:10,engines:9,sensors:10,structure:13,weapons:9,command:4,conn:1,security:2,engineering:3,science:3,medicine:2,talent:"",thumb:"shipthumbs/shipthumb_55.png",trait:"As the borders of the Federation are wide, Starfleet needs vessels that can operate remotely. Enter the Jupiter Carrier. Including a flight deck and fabrication facilities, she is a mobile starbase, and can build, repair, even defend in deep space."},
  {name:"Hestia",era:"Star Trek Online (2409-2411)",scale:4,comms:9,computers:9,engines:11,sensors:9,structure:11,weapons:12,command:3,conn:2,security:4,engineering:3,science:2,medicine:2,talent:"",thumb:"shipthumbs/shipthumb_56.png",trait:"As threats to the Federation continue to grow, the boundaries of the galaxy appear to grow along with it. Starfleet saw the need to dig out the Prometheus program and refine it with modern technologies, allowing a vessel to effectively respond to threats at the very edge of our territories."},
  {name:"Arbiter",era:"Star Trek Online (2409-2411)",scale:4,comms:10,computers:10,engines:12,sensors:11,structure:11,weapons:10,command:4,conn:2,security:2,engineering:2,science:3,medicine:2,talent:"",thumb:"shipthumbs/shipthumb_57.png",trait:"With the Iconian threat bearing down on the Federation, they needed to build a more formidable ship. With the help of Klingon Alliance engineers, the Federation designed a nimble, vicious cruiser."},
  {name:"Montgomery",era:"Star Trek Online (2409-2411)",scale:4,comms:10,computers:10,engines:10,sensors:12,structure:12,weapons:9,command:2,conn:3,security:2,engineering:3,science:4,medicine:1,talent:"",thumb:"shipthumbs/shipthumb_58.png",trait:"After discovering the Solonae Dyson Sphere, the Alliance used unearthed technologies to build ships that could withstand the intense phenomenom of stars, singularities, and other extreme oddities. The initial result was this prototype."},
  {name:"Resolute",era:"Star Trek Online (2409-2411)",scale:5,comms:11,computers:11,engines:11,sensors:10,structure:9,weapons:9,command:4,conn:2,security:3,engineering:3,science:2,medicine:2,talent:"",thumb:"shipthumbs/shipthumb_59.png",trait:"An evolution of the Excelsior class, the Resolute updates many systems to the current standards. With a high impulse (without introducing the time variances in relativistic physics), the Resolute can easily chase down its prey."},
  {name:"Pathfinder",era:"Star Trek Online (2409-2411)",scale:4,comms:9,computers:11,engines:11,sensors:11,structure:9,weapons:9,command:2,conn:4,security:2,engineering:2,science:4,medicine:1,talent:"",thumb:"shipthumbs/shipthumb_60.png",trait:"Wishing to return to a more science-focused space frame, Pathfinder was seen as an evolution of the Intrepid class. Overseen by Admiral Tuvok directly, this class featured many upgrades for the current era."},
  {name:"Eclipse",era:"Star Trek Online (2409-2411)",scale:5,comms:9,computers:9,engines:11,sensors:12,structure:11,weapons:9,command:3,conn:3,security:2,engineering:3,science:3,medicine:1,talent:"",thumb:"shipthumbs/shipthumb_61.png",trait:"Implemented by Starfleet Intelligence, the Eclipse class utilized special techniques to baffle sensors and fly undetected in enemy space. With special intel gathering technology, the Eclipse is designed for long range recon duties."},
  {name:"Scryer",era:"Star Trek Online (2409-2411)",scale:4,comms:10,computers:10,engines:9,sensors:11,structure:11,weapons:9,command:3,conn:2,security:2,engineering:1,science:3,medicine:2,talent:"",thumb:"shipthumbs/shipthumb_62.png",trait:"Implemented by Starfleet Intelligence, the Scryer was designed with extensive research labs and long-range sensors in mind. The outer ring of the saucer section sports sensor systems and weapons packages that make the ship ideal for high-risk espionage operations."},
  {name:"Phantom",era:"Star Trek Online (2409-2411)",scale:3,comms:9,computers:9,engines:11,sensors:11,structure:11,weapons:10,command:2,conn:3,security:3,engineering:2,science:1,medicine:1,talent:"",thumb:"shipthumbs/shipthumb_63.png",trait:"Implemented by Starfleet Intelligence, the Phantom was built with the speed and weapons to tail, ambush, and surprise enemies. Having the same stealth characteristics of its intel sisters, The phantom had a slim profile and could slip under enemy lines without detection."},
  {name:"M'Benga",era:"Star Trek Online (2409-2411)",scale:5,comms:9,computers:9,engines:11,sensors:10,structure:11,weapons:11,command:3,conn:1,security:4,engineering:2,science:2,medicine:4,talent:"",thumb:"shipthumbs/shipthumb_64.png",trait:"With many new threats on the horizon, Starfleet wanted an armed stealth carrier- a ship that could warp into hot zones, reach at-risk people quickly, and defend itself while ferrying them out. This vessel also includes a wing of customized type 11 shuttles, designed for triage and stealth."},
  {name:"Grissom",era:"Star Trek Online (2409-2411)",scale:3,comms:11,computers:10,engines:9,sensors:12,structure:9,weapons:9,command:1,conn:3,security:2,engineering:3,science:4,medicine:2,talent:"",thumb:"shipthumbs/shipthumb_65.png",trait:"Seeking a light duty science vessel with all the modern refinements, the Grissom features quantum slipstream, an updated sensor package, and impulse engines that make it incredibly agile."},
  {name:"Adamant",era:"Star Trek Online (2409-2411)",scale:3,comms:10,computers:9,engines:12,sensors:9,structure:9,weapons:13,command:2,conn:3,security:5,engineering:3,science:1,medicine:2,talent:"",thumb:"shipthumbs/shipthumb_66.png",trait:"With the success of the Defiant program, Starfleet decided to re-address the space frame in the 25th century. With the latest in cannon and torpedo technology, the Adamant is a formidable foe to the emerging threats against the Federation."},
  {name:"Seneca",era:"Star Trek Online (2409-2411)",scale:6,comms:9,computers:9,engines:9,sensors:9,structure:9,weapons:9,command:4,conn:2,security:3,engineering:2,science:3,medicine:4,talent:"",thumb:"shipthumbs/shipthumb_67.png",trait:"The modular design of the Hiawatha inspired engineers at Starfleet to evolve the model to include additional infrastructure. The result is the Seneca class, a larger carrier that includes many of the medical facilities, along with a flight deck and shuttle complement."},
  {name:"Equinox",era:"Star Trek Online (2409-2411)",scale:3,comms:10,computers:10,engines:11,sensors:10,structure:8,weapons:9,command:2,conn:3,security:2,engineering:2,science:4,medicine:3,talent:"",thumb:"shipthumbs/shipthumb_68.png",trait:"With the oddities in the Dranuur system, the discovery of the two Dyson spheres, and so many new scientific puzzles impacting the Alliance, Starfleet felt it was time to resurrect the Nova class with a bevy of new, modern improvements."},
  {name:"Da Vinci",era:"Star Trek Online (2409-2411)",scale:3,comms:10,computers:10,engines:11,sensors:10,structure:9,weapons:9,command:2,conn:4,security:4,engineering:3,science:3,medicine:2,talent:"",thumb:"shipthumbs/shipthumb_69.png",trait:"The squat, stable frame of the Saber class inspired many hypotheses from Starfleet. With so few stress points, and the ability to rapidly transfer power across systems, the Da Vinci became a test bed for the early 25th century technology."},
  {name:"Glenn",era:"Star Trek Online (2409-2411)",scale:4,comms:9,computers:9,engines:11,sensors:11,structure:8,weapons:9,command:1,conn:2,security:2,engineering:4,science:4,medicine:2,talent:"",thumb:"shipthumbs/shipthumb_70.png",trait:"With the introduction of quantum slipstream and transwarp, Starfleet dug out a mothballed frame that excelled at handling the rigors of new transportation. The Glenn class, an update of the Crossfield, took to QSD and transwarp quickly, making it an excellent candidate for search & rescue."},
  {name:"Buran",era:"Star Trek Online (2409-2411)",scale:4,comms:12,computers:10,engines:10,sensors:10,structure:10,weapons:10,command:4,conn:2,security:3,engineering:2,science:3,medicine:1,talent:"",thumb:"shipthumbs/shipthumb_71.png",trait:"Recovered at the abandoned Yard 39, the Cardenas class space frames were still valuable. Despite being 150 years old, extensive refits were overseen in order to face the new Klingon threat. Like the Cardenas class, this battlecruiser is designed for the front lines."},
  {name:"Europa",era:"Star Trek Online (2409-2411)",scale:4,comms:10,computers:10,engines:10,sensors:10,structure:10,weapons:11,command:2,conn:2,security:3,engineering:2,science:2,medicine:3,talent:"",thumb:"shipthumbs/shipthumb_72.png",trait:"With the radiation dissipation at Yard 39, Starfleet was able to recover a number of old frames. Overhauled from the famed Nimitz Class, the Europa was updated to be a defense powerhouse. Able to shake off heavy damage, the Europa is well suited for the rigors of space."},
  {name:"Justicar",era:"Star Trek Online (2409-2411)",scale:6,comms:11,computers:9,engines:8,sensors:9,structure:11,weapons:9,command:4,conn:2,security:3,engineering:2,science:1,medicine:2,talent:"",thumb:"shipthumbs/shipthumb_73.png",trait:"With defense becoming so imperative across the quadrants, Starfleet decided it needed a space frame that reminded others they'd rather exchange handshakes than blows. Enter the Justicar, a vessel lovingly referred to as the \"tank\", by its captains."},
  {name:"Jupiter",era:"Star Trek Online (2409-2411)",scale:8,comms:11,computers:9,engines:8,sensors:8,structure:12,weapons:9,command:3,conn:2,security:2,engineering:4,science:2,medicine:2,talent:"",thumb:"shipthumbs/shipthumb_74.png",trait:"While officially 'replaced' by the Jupiter Carrier class, a handful of these vessels still operate across the territory. Jupiters were designed with significant cargo capabilities, making them perfect for starbase construction or colony development."},
  {name:"Valiant",era:"Star Trek Online (2409-2411)",scale:3,comms:9,computers:9,engines:10,sensors:9,structure:11,weapons:11,command:3,conn:3,security:2,engineering:3,science:2,medicine:2,talent:"",thumb:"shipthumbs/shipthumb_75.png",trait:"Built as a Defiant variant, this model redirected the power once meant for weapons and cloaking to instead be used for tractor beams. The Valiant includes 2 wing-mounted tractor emitters, as well as a massive emitter on the belly of the vessel."},
  {name:"Somerville",era:"Star Trek Online (2409-2411)",scale:3,comms:10,computers:10,engines:9,sensors:11,structure:8,weapons:9,command:1,conn:2,security:3,engineering:1,science:3,medicine:1,talent:"",thumb:"shipthumbs/shipthumb_76.png",trait:"After the recovery of the Hernandez class at Yard 39, engineers modeled a new class, the Somerville, both combat equipped and Intel-outfitted. The ship was designed for scientific studies, yet included the cloak and weaponry to travel into dangerous territories."},
  {name:"Valdres",era:"Star Trek Online (2409-2411)",scale:4,comms:9,computers:8,engines:10,sensors:11,structure:10,weapons:10,command:3,conn:2,security:3,engineering:3,science:1,medicine:2,talent:"",thumb:"shipthumbs/shipthumb_77.png",trait:"Designed to ferry cargo and passengers in and out of unstable territories, the Valdres is equipped with a heavy-pulsed tractor beam generator, landing gear, and other unique features to make it perfect for rapid loading/unloading."},
  {name:"Appalachia",era:"Star Trek Online (2409-2411)",scale:4,comms:9,computers:9,engines:11,sensors:10,structure:9,weapons:9,command:1,conn:3,security:3,engineering:3,science:3,medicine:2,talent:"",thumb:"shipthumbs/shipthumb_78.png",trait:"With new Terran threats affecting the Khitomer Alliance, Starfleet decided to re-evaluate several frames. With slimmer ranks after years of persistent threats, Starfleet needed a fast patrol craft and blockade runner. A frame that could monitor large regions of space."},
  {name:"Paladin",era:"26th Century",scale:6,comms:10,computers:11,engines:11,sensors:10,structure:12,weapons:12,command:3,conn:2,security:3,engineering:2,science:3,medicine:3,talent:"",thumb:"shipthumbs/shipthumb_79.png",trait:"Outfitted for long-term missions (both in space and time), the Paladin frame was designed to be formidable, yet agile. These vessels utilize technology that can make alterations at the molecular level, giving ships more modularity than ever before."},
  {name:"Nautilus",era:"26th Century",scale:4,comms:10,computers:11,engines:10,sensors:13,structure:10,weapons:11,command:2,conn:2,security:3,engineering:3,science:3,medicine:4,talent:"",thumb:"shipthumbs/shipthumb_80.png",trait:"Utilizing a myriad of refinements and upgrades from the Borg cooperative, the Nautilus class is desgined for cross-time support operations. From advanced sickbays to portable ablative generators, these ships can assist in even the most dire crises."},
  {name:"Sagittarius",era:"26th Century",scale:6,comms:10,computers:11,engines:10,sensors:10,structure:11,weapons:11,command:3,conn:2,security:3,engineering:2,science:3,medicine:3,talent:"",thumb:"shipthumbs/shipthumb_81.png",trait:"In employing temporal duties, Starfleet needs a well-rounded vessel, capable of long-missions, potent sensors, and strong weapons. Enter the Sagittarius. Designed as a workhorse of temporal operations, this well-rounded frame is suited for many missions through time."},
  {name:"Theseus",era:"26th Century",scale:4,comms:10,computers:11,engines:12,sensors:10,structure:10,weapons:13,command:2,conn:3,security:4,engineering:2,science:3,medicine:3,talent:"",thumb:"shipthumbs/shipthumb_82.png",trait:"Science and weaponry blur in this temporal vessel, utilizing the latest in technology to defend the timeline against those who would corrupt it. The Theseus class was designed to pack both temporal and conventional weaponry into a single vessel, so that it could handle a myriad of threats."},
  {name:"Universe",era:"26th Century",scale:8,comms:10,computers:10,engines:9,sensors:9,structure:9,weapons:9,command:3,conn:1,security:3,engineering:3,science:3,medicine:3,talent:"",thumb:"shipthumbs/shipthumb_83.png",trait:"Starfleet's groundbreaking project, the Universe class, boasts a vast, open interior. Unlike conventional deck layouts, it features a city-like interior divided into \"urbs\" or suburbs. This colossal vessel utilizes site-to-site transporters due to its immense size."},
  {name:"Ouroboros",era:"26th Century",scale:4,comms:10,computers:10,engines:12,sensors:10,structure:10,weapons:12,command:2,conn:3,security:4,engineering:3,science:4,medicine:2,talent:"",thumb:"shipthumbs/shipthumb_84.png",trait:"After centuries of temporal operations, Starfleet refined their designs. With holo-emitters built into the hull, as well as several “decoy decks” that can be modified for the era, the Ouroboros can safely blend into any time period. It is sleek, agile, and powerful."},
  {name:"Wells",era:"26th Century",scale:4,comms:12,computers:11,engines:10,sensors:11,structure:10,weapons:10,command:4,conn:2,security:3,engineering:3,science:4,medicine:2,talent:"",thumb:"shipthumbs/shipthumb_85.png",trait:"A master in sensor technologies, the Wells class is able to scour through time at a higher resolution than many of its counterparts. These ships are often used in recon, to better gather information regarding temporal incursions."},
  {name:"Eisenberg",era:"32nd Century",scale:4,comms:7,computers:7,engines:7,sensors:6,structure:6,weapons:6,command:4,conn:2,security:2,engineering:3,science:2,medicine:2,talent:"",thumb:"shipthumbs/shipthumb_86.png",trait:"In 3069, a new series of vessels were introduced to shed Starfleet of its temporal abilities. The first new frame, the Eisenberg, would herald a new era of exploration and science. With the Burn disaster following, vessels like the USS Nog kept hope alive in a broken, desperate galaxy."},
  {name:"Janeway",era:"32nd Century",scale:4,comms:7,computers:6,engines:7,sensors:8,structure:6,weapons:5,command:2,conn:2,security:2,engineering:3,science:4,medicine:2,talent:"",thumb:"shipthumbs/shipthumb_87.png",trait:"Significant transformations have taken place during the Burn, impacting ecologies, planets, and civilizations. The need to analyze these changes has never been more critical. Enter the Janeway class, equipped with state-of-the-art sensors, dedicated to the task."},
  {name:"Kirk",era:"32nd Century",scale:4,comms:6,computers:6,engines:7,sensors:6,structure:6,weapons:8,command:3,conn:2,security:3,engineering:3,science:2,medicine:2,talent:"",thumb:"shipthumbs/shipthumb_88.png",trait:"A modern take on the Constution Class from Starfleet's early days, the Kirk class invokes memories of the days of old, while stepping forward into the future. Such an iconic space frame is still celebrated as a symbol of exploration, diplomacy, and defense."},
  {name:"Merian",era:"32nd Century",scale:4,comms:7,computers:6,engines:8,sensors:7,structure:6,weapons:6,command:3,conn:2,security:2,engineering:3,science:2,medicine:3,talent:"",thumb:"shipthumbs/shipthumb_89.png",trait:"Starfleet needed a vessel that could maintain high-speed quantum and transwarp travel, while preparing to deal with a myriad of crises. The result was the Merian, a space frame that could focus on rescue missions, despite the danger."},
  {name:"Saturn",era:"32nd Century",scale:6,comms:6,computers:7,engines:6,sensors:7,structure:8,weapons:6,command:2,conn:2,security:2,engineering:3,science:4,medicine:3,talent:"",thumb:"shipthumbs/shipthumb_90.png",trait:"The torus shape of the vessel allows for unique warp fields and shields, allowing the crew to safely encircle phenomena they'd like to study."},
  {name:"Kwejian Freighter",era:"32nd Century",scale:2,comms:6,computers:6,engines:8,sensors:6,structure:8,weapons:6,command:2,conn:4,security:3,engineering:2,science:2,medicine:2,talent:"",thumb:"shipthumbs/shipthumb_91.png",trait:"These small, sleek ships were designed with speed and maneuverability in mind. On such a small ship, the programmable matter can quickly and easily reconfigure the entirety of the vessel. The smasher assembly makes the vessel highly durable."},
  {name:"Angelou",era:"32nd Century",scale:5,comms:7,computers:6,engines:6,sensors:7,structure:8,weapons:6,command:2,conn:2,security:2,engineering:3,science:3,medicine:3,talent:"",thumb:"shipthumbs/shipthumb_92.png",trait:"Intended for deep space, long-term service, these biome ships could host a large island onboard. When needed, protomatter hulls can cover the transparent metals to further protect the interior. A shuttle bay and crew stations are housed in the rear and center."},
  {name:"Courage",era:"32nd Century",scale:4,comms:6,computers:6,engines:6,sensors:8,structure:6,weapons:8,command:2,conn:2,security:3,engineering:2,science:3,medicine:2,talent:"",thumb:"shipthumbs/shipthumb_93.png",trait:"Utilizing a unique, bi-directional design, the Courage sports a secondary deflector and sensor packages on the front, and at the rear, it bristles with weaponry. When needed, the vessel pivots from science to tactical mode, immediately reversing direction."}

let ACTIVE_SLOT = 0;
let S = defaultState();
window._mapZoom = null;

function saveSlot() {
  localStorage.setItem(`stcl_slot_${ACTIVE_SLOT}`, JSON.stringify(S));
  localStorage.setItem('stcl_active_slot', ACTIVE_SLOT);
  updateSlotLabels();
  hudBroadcast();
}

function loadSlot(n) {
  ACTIVE_SLOT = n;
  const raw = localStorage.getItem(`stcl_slot_${n}`);
  if (raw) {
    try {
      const saved = JSON.parse(raw);
      S = defaultState();
      if (saved.char) S.char = Object.assign(defaultChar(), saved.char);
      if (saved.ship) S.ship = Object.assign(defaultShip(), saved.ship);
      if (saved.sectors) S.sectors = saved.sectors;
      if (saved.activeSector !== undefined) S.activeSector = saved.activeSector;
      if (saved.npcs) S.npcs = saved.npcs;
      if (saved.combatEnemies) S.combatEnemies = saved.combatEnemies;
      if (saved.playerStress) S.playerStress = saved.playerStress;
      if (saved.log) S.log = saved.log;
    } catch(e) { S = defaultState(); }
  } else {
    S = defaultState();
  }
  localStorage.setItem('stcl_active_slot', n);
  updateSlotLabels();
}

function updateSlotLabels() {
  for(let i=0;i<3;i++){
    const btn = document.getElementById(`slot${i}`);
    const raw = localStorage.getItem(`stcl_slot_${i}`);
    let label = `MISSION ${i+1}`;
    if(raw){try{const d=JSON.parse(raw);if(d.char?.name)label=d.char.name.toUpperCase().slice(0,10);}catch(e){}}
    btn.textContent = label;
    btn.className = `slot-btn${i===ACTIVE_SLOT?' active':''}`;
  }
}

async function exportToFile() {
  const data = { version: 1, active: ACTIVE_SLOT, slots: {} };
  for (let i = 0; i < 3; i++) {
    const raw = localStorage.getItem(`stcl_slot_${i}`);
    if (raw) try { data.slots[i] = JSON.parse(raw); } catch(e) {}
  }
  const json = JSON.stringify(data, null, 2);
  if (window.showSaveFilePicker) {
    try {
      const fh = await window.showSaveFilePicker({
        suggestedName: 'captains-log.json',
        types: [{ description: "Captain's Log Save", accept: { 'application/json': ['.json'] } }]
      });
      const writable = await fh.createWritable();
      await writable.write(json);
      await writable.close();
    } catch(e) { if (e.name !== 'AbortError') alert('Save failed: ' + e.message); }
  } else {
    const a = document.createElement('a');
    a.href = 'data:application/json,' + encodeURIComponent(json);
    a.download = 'captains-log.json';
    a.click();
  }
}

function importFromFile() {
  if (window.showOpenFilePicker) {
    window.showOpenFilePicker({
      types: [{ description: "Captain's Log Save", accept: { 'application/json': ['.json'] } }]
    }).then(async ([fh]) => {
      const file = await fh.getFile();
      const text = await file.text();
      _applyImport(text);
    }).catch(e => { if (e.name !== 'AbortError') alert('Load failed: ' + e.message); });
  } else {
    const inp = document.createElement('input');
    inp.type = 'file'; inp.accept = '.json';
    inp.onchange = e => {
      const file = e.target.files[0]; if (!file) return;
      const reader = new FileReader();
      reader.onload = ev => _applyImport(ev.target.result);
      reader.readAsText(file);
    };
    inp.click();
  }
}

function _applyImport(text) {
  try {
    const data = JSON.parse(text);
    if (!data.slots) throw new Error('Invalid save file.');
    showConfirm('Load save file? This will overwrite all current mission slots.', ()=>{
      for (let i = 0; i < 3; i++) {
        if (data.slots[i]) localStorage.setItem(`stcl_slot_${i}`, JSON.stringify(data.slots[i]));
        else localStorage.removeItem(`stcl_slot_${i}`);
      }
      loadSlot(data.active ?? 0);
      renderCurrentTab();
    }, 'LOAD FILE', false);
  } catch(e) { openModal(`<p style="font-size:13px;color:var(--danger);margin-bottom:16px">Failed to load file: ${escH(e.message)}</p><button class="btn" onclick="closeModal()" style="width:100%">OK</button>`); }
}

function selectSlot(n) {
  if(n===ACTIVE_SLOT)return;
  loadSlot(n); renderCurrentTab();
}

  if (_officerSubTab === 'ship') return tabs + renderShipTab();
  return tabs + renderSheet();
}
function setOfficerSubTab(t) { _officerSubTab=t; renderCurrentTab(); }

function renderSheet() {
  const c = S.char;
  // Attribute grid
  let attrHTML = '<div class="attr-grid">';
  ATTRIBUTES.forEach(a => {
    attrHTML += `<div class="attr-box">
      <div class="attr-abbr">${a.abbr}</div>
      <div class="attr-val" id="attr-${a.key}">${c[a.key]}</div>
      <div style="display:flex;gap:4px;justify-content:center;margin-top:2px">
        <button class="res-btn" onclick="adjAttr('${a.key}',-1)">-</button>
        <button class="res-btn" onclick="adjAttr('${a.key}',1)">+</button>
      </div>
      <div class="attr-full">${a.full}</div>
    </div>`;
  });
  attrHTML += '</div>';

  // Discipline dots
  let discHTML = '<div class="disc-grid">';
  DISCIPLINES.forEach(d => {
    const rank = c[d.key] || 1;
    let dots = '<div class="disc-dots">';
    for(let i=1;i<=5;i++) dots += `<div class="dot${i<=rank?' filled':''}" onclick="setDisc('${d.key}',${i})" ondblclick="setDisc('${d.key}',1)" title="${d.full} ${i}"></div>`;
    dots += '</div>';
    discHTML += `<div class="disc-row">
      <span style="font-size:9px;color:var(--muted);min-width:28px">${d.abbr}</span>
      <span class="disc-name">${d.full}</span>
      ${dots}
      <span style="font-size:11px;color:var(--accent);min-width:16px">${rank}</span>
    </div>`;
  });
  discHTML += '</div>';

  // Determination
  let detHTML = '';
  for(let i=0;i<3;i++) detHTML += `<span class="det-dot${i<c.determination?' filled':''}" onclick="toggleDet(${i})"></span>`;

  // Values
  let valHTML = '';
  c.values.forEach((v,i) => {
    const used = c.valuesUsed[i];
    const challenged = c.valuesChallenged[i];
    valHTML += `<div class="value-row">
      <input class="value-input" value="${escH(v)}" placeholder="Value ${i+1}…" onchange="setValueText(${i},this.value)">
      <button class="value-toggle${used?' used':''}" onclick="toggleValueUsed(${i})">${used?'USED':'Use'}</button>
      <button class="value-toggle${challenged?' challenged':''}" onclick="toggleValueChallenged(${i})">${challenged?'CHALLENGED':'Challenge'}</button>
    </div>`;
  });

  // Focuses
  let focHTML = '';
  if(c.focuses.length) {

  <div class="card">

        <input id="gear-name-in" placeholder="Item name" style="flex:1;background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:5px 8px;border-radius:3px;font-size:12px;min-width:0">

function renderCreation() {
  const step = S.char.creationStep || 0;
  const info = CREATION_STEPS[step];
  let prog = '<div class="wizard-progress">';
  CREATION_STEPS.forEach((_,i) => prog += `<div class="wizard-step${i<step?' done':i===step?' active':''}"></div>`);
  prog += '</div>';

  let body = '';
  switch(step) {
    case 0: body = renderCS0(); break;
    case 1: body = renderCS1(); break;
    case 2: body = renderCS2(); break;
    case 3: body = renderCS3(); break;
    case 4: body = renderCS4(); break;
    case 5: body = renderCS5(); break;
    case 6: body = renderCS6(); break;
    case 7: body = renderCS7(); break;
  }

  return `<div class="card">
    <div style="font-size:9px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:4px">Step ${step+1} of ${CREATION_STEPS.length}</div>
    <div class="header-title glow">${info.title}</div>
    <div style="font-size:11px;color:var(--muted);margin-top:2px;margin-bottom:12px">${info.sub}</div>
    ${prog}
    ${body}
    <div class="wizard-nav">
      ${step>0?'<button class="btn" onclick="creationBack()">← Back</button>':''}
      <button class="btn btn-accent" style="margin-left:auto" onclick="creationNext()">${step<CREATION_STEPS.length-1?'Next →':'Finish!'}</button>
    </div>
  </div>`;
}

function renderCS0() {
  const c = S.char;
  const lp = c._lp || {};
  const eraOpts = ERAS.map(e=>`<option${c._selectedEra===e?' selected':''}>${e}</option>`).join('');
  let speciesRows = SPECIES_LIST.map(sp => {
    const sel = c._selectedSpecies === sp.name;
    return `<tr onclick="setCreationSpecies('${escQ(sp.name)}')" class="${sel?'selected':''}">
      <td><strong${sel?' style="color:var(--accent)"':''}>${sp.name}</strong></td>
      <td style="color:var(--muted);font-size:10px">${sp.attrBonus}</td>
      <td style="color:var(--muted);font-size:10px">${sp.disBonus}</td>
    </tr>`;
  }).join('');

  let bonusPicker = '';
  const sp = SPECIES_LIST.find(s => s.name === c._selectedSpecies);
  if (sp) {
    bonusPicker = `<div style="background:var(--surface2);border:1px solid var(--border);border-radius:4px;padding:10px;margin-top:8px">
      <div style="font-size:10px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:8px">Species Bonuses — ${escH(sp.name)}</div>`;
    const fixed = Object.entries(sp._attr||{});
    if (fixed.length > 0) {
      bonusPicker += `<div style="font-size:11px;color:var(--muted);margin-bottom:6px">Auto-applied: ${fixed.map(([k,v])=>`<strong style="color:var(--accent)">${k} +${v}</strong>`).join(', ')}</div>`;
    }
    for (let i = 0; i < (sp._attrFree||0); i++) {
      const chosen = (lp.speciesAttrFree||[])[i];
      bonusPicker += `<div style="margin-bottom:6px;font-size:11px;display:flex;align-items:center;gap:6px;flex-wrap:wrap">
        <span style="color:var(--muted);min-width:120px">Free Attr +1 (${i+1}/${sp._attrFree}):</span>`;
      ATTRIBUTES.forEach(a => {
        bonusPicker += `<button class="btn btn-xs${chosen===a.key?' btn-accent':''}" onclick="setLPSpeciesAttrFree('${a.key}',${i})">${a.abbr}</button>`;
      });
      if (!chosen) bonusPicker += `<span style="color:var(--danger);font-size:10px">← choose one</span>`;
      bonusPicker += `</div>`;
    }
    if (sp._discOpts && sp._discOpts.length > 0) {
      const chosen = lp.speciesDiscChoice;
      bonusPicker += `<div style="font-size:11px;display:flex;align-items:center;gap:6px;flex-wrap:wrap">
        <span style="color:var(--muted);min-width:120px">Discipline +1:</span>`;
      sp._discOpts.forEach(k => {
        const d = DISCIPLINES.find(d => d.key === k);
        bonusPicker += `<button class="btn btn-xs${chosen===k?' btn-accent':''}" onclick="setLPSpeciesDisc('${k}')">${d?d.abbr:k}</button>`;
      });
      if (!chosen) bonusPicker += `<span style="color:var(--danger);font-size:10px">← choose one</span>`;
      bonusPicker += `</div>`;
    } else if ((sp._discFree||0) > 0) {
      for (let i = 0; i < sp._discFree; i++) {
        const chosen = (lp.speciesDiscFree||[])[i];
        bonusPicker += `<div style="margin-bottom:6px;font-size:11px;display:flex;align-items:center;gap:6px;flex-wrap:wrap">
          <span style="color:var(--muted);min-width:120px">Free Disc +1 (${i+1}/${sp._discFree}):</span>`;
        DISCIPLINES.forEach(d => {
          bonusPicker += `<button class="btn btn-xs${chosen===d.key?' btn-accent':''}" onclick="setLPSpeciesDiscFree('${d.key}',${i})">${d.abbr}</button>`;
        });
        if (!chosen) bonusPicker += `<span style="color:var(--danger);font-size:10px">← choose one</span>`;
        bonusPicker += `</div>`;
      }
    }
    bonusPicker += `</div>`;
  }

  return `
  <div class="field"><label>Era</label>
    <select onchange="saveCharField('_selectedEra',this.value)"><option value="">— Select Era —</option>${eraOpts}</select>
  </div>
  <p style="font-size:11px;color:var(--muted);margin-bottom:8px">Click a species to select it, then assign your bonuses below.</p>
  ${c._selectedSpecies?`<div style="color:var(--accent);font-size:12px;margin-bottom:8px">Selected: <strong>${escH(c._selectedSpecies)}</strong></div>`:''}
  <div style="max-height:280px;overflow-y:auto;margin-bottom:4px">
    <table class="roll-table">
      <thead><tr><th>Species</th><th>Attribute Bonus</th><th>Discipline Bonus</th></tr></thead>
      <tbody>${speciesRows}</tbody>
    </table>
  </div>
  ${bonusPicker}`;
}

function renderCS1() {
  const c = S.char;
  const lp = c._lp || {};
  let envRows = ENVIRONMENTS.map(e=>{
    const sel=c._selectedEnv===e.name;
    return `<tr onclick="saveCharField('_selectedEnv','${escQ(e.name)}');renderCurrentTab()">
      <td><strong${sel?' style="color:var(--accent)"':''}>${e.name}</strong></td>
      <td style="color:var(--muted);font-size:10px">${e.bonus}</td>
    </tr>`;
  }).join('');
  let upRows = UPBRINGINGS.map(u=>{
    const sel=c._selectedUpbringing===u.name;
    return `<tr onclick="saveCharField('_selectedUpbringing','${escQ(u.name)}');renderCurrentTab()">
      <td style="color:var(--muted)">${u.d}</td>
      <td><strong${sel?' style="color:var(--accent)"':''}>${u.name}</strong></td>
      <td style="color:var(--muted);font-size:10px">${u.attrBonus}</td>
      <td style="color:var(--muted);font-size:10px">${u.disBonus}</td>
    </tr>`;
  }).join('');

  let envPicker = '';
  const env = ENVIRONMENTS.find(e => e.name === c._selectedEnv);
  if (env) {
    const chosen = lp.envAttr;
    envPicker = `<div style="background:var(--surface2);border:1px solid var(--border);border-radius:4px;padding:8px;margin-bottom:8px">
      <div style="font-size:10px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:6px">Environment Bonus — ${escH(env.name)}</div>
      <div style="font-size:11px;display:flex;align-items:center;gap:6px;flex-wrap:wrap">
        <span style="color:var(--muted)">Attribute +1:</span>`;
    env._attrOpts.forEach(k => {
      const a = ATTRIBUTES.find(a => a.key === k);
      envPicker += `<button class="btn btn-xs${chosen===k?' btn-accent':''}" onclick="setLPEnvAttr('${k}')">${a?a.abbr:k}</button>`;
    });
    if (!chosen) envPicker += `<span style="color:var(--danger);font-size:10px">← choose one</span>`;
    envPicker += `</div>
      <div style="font-size:11px;color:var(--muted);margin-top:8px;margin-bottom:4px">Environment Focus — gain 1 focus related to your environment</div>
      <div style="display:flex;gap:6px">
        <input id="focus-env-in" placeholder="Enter environment focus…" style="flex:1;background:var(--surface3);border:1px solid var(--border);color:var(--text);padding:4px 8px;border-radius:3px;font-size:12px">
        <button class="btn btn-sm btn-accent" onclick="addFocusFrom('focus-env-in')">ADD FOCUS</button>
      </div>`;
    if ((c.focuses||[]).length > 0) {
      envPicker += `<div style="font-size:10px;color:var(--muted);margin-top:5px">Focuses so far: ${(c.focuses).map(f=>`<strong>${escH(f)}</strong>`).join(', ')}</div>`;
    }
    envPicker += `</div>`;
  }

  let upbrPicker = '';
  const upbr = UPBRINGINGS.find(u => u.name === c._selectedUpbringing);
  if (upbr) {
    const chosenAttr = lp.upbrAttr;
    const chosenDisc = lp.upbrDisc;
    upbrPicker = `<div style="background:var(--surface2);border:1px solid var(--border);border-radius:4px;padding:8px;margin-top:6px">
      <div style="font-size:10px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:6px">Upbringing Bonus — ${escH(upbr.name)}</div>
      <div style="font-size:11px;display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:6px">
        <span style="color:var(--muted);min-width:90px">Attribute +1:</span>`;
    upbr._attrOpts.forEach(k => {
      const a = ATTRIBUTES.find(a => a.key === k);
      upbrPicker += `<button class="btn btn-xs${chosenAttr===k?' btn-accent':''}" onclick="setLPUpbrAttr('${k}')">${a?a.abbr:k}</button>`;
    });
    if (!chosenAttr) upbrPicker += `<span style="color:var(--danger);font-size:10px">← choose one</span>`;
    upbrPicker += `</div><div style="font-size:11px;display:flex;align-items:center;gap:6px;flex-wrap:wrap">
        <span style="color:var(--muted);min-width:90px">Discipline +1:</span>`;
    upbr._discOpts.forEach(k => {
      const d = DISCIPLINES.find(d => d.key === k);
      upbrPicker += `<button class="btn btn-xs${chosenDisc===k?' btn-accent':''}" onclick="setLPUpbrDisc('${k}')">${d?d.abbr:k}</button>`;
    });
    if (!chosenDisc) upbrPicker += `<span style="color:var(--danger);font-size:10px">← choose one</span>`;
    upbrPicker += `</div>
      <div style="font-size:11px;color:var(--muted);margin-top:8px;margin-bottom:4px">Upbringing Focus — gain 1 focus related to your upbringing</div>
      <div style="display:flex;gap:6px">
        <input id="focus-upbr-in" placeholder="Enter upbringing focus…" style="flex:1;background:var(--surface3);border:1px solid var(--border);color:var(--text);padding:4px 8px;border-radius:3px;font-size:12px">
        <button class="btn btn-sm btn-accent" onclick="addFocusFrom('focus-upbr-in')">ADD FOCUS</button>
      </div>`;
    if ((c.focuses||[]).length > 0) {
      upbrPicker += `<div style="font-size:10px;color:var(--muted);margin-top:5px">Focuses so far: ${(c.focuses).map(f=>`<strong>${escH(f)}</strong>`).join(', ')}</div>`;
    }
    upbrPicker += `</div>`;
  }

  return `
  <div style="display:flex;gap:6px;margin-bottom:8px;flex-wrap:wrap;align-items:center">
    <button class="btn btn-accent btn-sm" onclick="rollUpbringing()">Roll Upbringing (d20)</button>

  <p style="font-size:11px;color:var(--muted);margin-bottom:6px">Choose your childhood environment, then roll or pick an upbringing. Assign bonuses below.</p>

  <div style="font-size:10px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:4px;margin-top:10px">Upbringing</div>

      <tbody>${upRows}</tbody>
    </table>
  </div>
  ${upbrPicker}`;
