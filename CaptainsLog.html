<!-- LEFT (creation mode): Officer creation progress -->
<div id="p-creation" class="panel" style="display:none">
  <div class="cr-title">Creating Officer</div>
  <div id="cr-dots" class="cr-dots"></div>
  <div id="cr-step" class="cr-step"></div>
  <div id="cr-body"></div>
</div>

<script>
var _rec=null,_chunks=[],_timer=null,_secs=0;
var _stream=null,_hdStream=null,_bgEffect=null,_bgDisplayStream=null;
var _previewStream=null,_previewEffect=null;
var _bgType='none',_bgSrc='';var BG_BASE='${bgBase}';
var _segThreshold=140,_segFeather=4,_segModelSel=1,_camResH=720;
var _ch=new BroadcastChannel('stcl-hud');
_ch.onmessage=function(e){if(e.data&&e.data.type==='state')applyState(e.data);};

var CREATION_STEP_NAMES=['Species & Era','Environment','Academy Track','Attributes','Disciplines','Values & Focuses','Officer Details','Your Ship'];

function applyState(d){
  var vis=d.vis||{};

  // Creation mode
  if(d.creation){
    var cr=d.creation;
    var stepCount=CREATION_STEP_NAMES.length;
    var dots='';
    for(var si=0;si<stepCount;si++){
      var dc=si<cr.step?'cr-dot done':si===cr.step?'cr-dot active':'cr-dot';
      dots+='<div class="'+dc+'" title="'+CREATION_STEP_NAMES[si]+'"></div>';
    }
    setHTML('cr-dots',dots);
    setText('cr-step','Step '+(cr.step+1)+' of '+stepCount+' — '+(CREATION_STEP_NAMES[cr.step]||''));
    var cb='';
    if(cr.species){cb+='<div class="cr-field"><div class="cr-lbl">Species</div><div class="cr-val">'+cr.species+'</div>'+(cr.era?'<div class="cr-sub">'+cr.era+'</div>':'')+'</div>';}
    if(cr.env){cb+='<div class="cr-field"><div class="cr-lbl">Environment</div><div class="cr-val">'+cr.env+'</div>'+(cr.upbringing?'<div class="cr-sub">'+cr.upbringing+'</div>':'')+'</div>';}
    if(cr.track){cb+='<div class="cr-field"><div class="cr-lbl">Academy Track</div><div class="cr-val">'+cr.track+'</div></div>';}
    if(cr.careerEvent){cb+='<div class="cr-field"><div class="cr-lbl">Career Event</div><div class="cr-val" style="font-size:11px">'+cr.careerEvent+'</div></div>';}
    if(cr.focuses&&cr.focuses.length){cb+='<div class="cr-field"><div class="cr-lbl">Focuses</div><div class="cr-feats">'+cr.focuses.map(function(f){return '<div class="cr-feat">'+f+'</div>';}).join('')+'</div></div>';}
    if(cr.name){cb+='<div class="cr-field"><div class="cr-lbl">Name</div><div class="cr-val">'+cr.name+'</div>'+(cr.rank?'<div class="cr-sub">'+cr.rank+'</div>':'')+'</div>';}
    setHTML('cr-body',cb||'<div class="sml">Waiting for input\u2026</div>');
    show('p-creation',true);
    show('p-left',false);
    show('p-sector',false);
    show('p-interior',false);
    show('p-right',vis.log!==false);
    show('p-mission',false);
    show('p-spotlight',false);
    show('p-dice',vis.dice!==false);
    return;
  }

  show('p-creation',false);
  var showShip=vis.shipStats===true;
  show('p-left',vis.stats===true||vis.stats===undefined);
  show('h-officer-section',!showShip);
  show('h-shipstats-section',showShip);
  setText('p-left-header',showShip?'Ship':'Officer');
  show('p-sector',vis.sectorMap===true);
  show('p-interior',vis.interiorMap===true);
  show('p-right',vis.log!==false||vis.encounter!==false);
  show('p-dice',vis.dice!==false);
  show('p-mission',true);
  show('h-vitals-wrap',vis.vitals!==false);
  show('h-log-section',vis.log!==false);
  show('h-enc-section',vis.encounter!==false);
  // NPC Spotlight — separate floating panel
  var npcSpot=(vis.npcSpot!=null?vis.npcSpot:-1);
  var npcs=d.npcs||[];
  if(npcSpot>=0&&npcs[npcSpot]){
    var npc=npcs[npcSpot];
    show('p-spotlight',true);
    setText('h-spot-name',npc.name||'Unknown');
    setText('h-spot-sub',(npc.faction||'')+(npc.role?' \u00b7 '+npc.role:''));
    setText('h-spot-notes',npc.notes?(npc.notes.slice(0,200)):'');
  }else{show('p-spotlight',false);}

  var c=d.char||{};
  setText('h-name',c.name||'Unknown Officer');
  setText('h-rank',(c.rank||'')+(c.species?' \u00b7 '+c.species:''));
  setText('h-era',c.era||'');

  // Attributes — vertical rows with proportional bar (max 12)
  var ATTRS=[['Control',c.control],['Daring',c.daring],['Fitness',c.fitness],['Insight',c.insight],['Presence',c.presence],['Reason',c.reason]];
  setHTML('h-attrs',ATTRS.map(function(a){
    var v=a[1]||0,pct=Math.min(100,Math.round(v/12*100));
    return '<div class="attr-item"><span class="an">'+a[0]+'</span><div class="ab"><div class="ab-fill" style="width:'+pct+'%"></div></div><span class="av">'+(v||'\u2014')+'</span></div>';
  }).join(''));

  // Disciplines — pip dots (max 5)
  var DISCS=[['Command',c.command],['Conn',c.conn],['Security',c.security],['Engineering',c.engineering],['Science',c.science],['Medicine',c.medicine]];
  setHTML('h-discs',DISCS.map(function(a){
    var v=a[1]||0,dots='';
    for(var i=1;i<=5;i++)dots+='<div class="ddot'+(i<=v?' on':'')+'"></div>';
    return '<div class="disc-item-v"><span class="dn">'+a[0]+'</span><div class="dd">'+dots+'</div></div>';
  }).join(''));

  // Vitals
  var det=c.determination||0,detH='';
  for(var i=1;i<=3;i++)detH+='<div class="det-dot'+(i<=det?' on':'')+'"></div>';
  setHTML('h-det',detH);
  setText('h-momentum',c.momentum||0);
  setText('h-threat',c.threat||0);

  // Mission
  setText('h-mission-text',c.assignment||c.role||'No mission assigned');
  var sh=d.ship||{};
  setText('h-ship-text',sh.name?(sh.name+(sh.className?' \u00b7 '+sh.className:'')+(sh.scale?' \u00b7 Scale '+sh.scale:'')):'No ship configured');

  // Ship Stats — systems use bars (max 12), departments use pip dots (max 5)
  var SYS=[['Comms',sh.comms],['Computers',sh.computers],['Engines',sh.engines],['Sensors',sh.sensors],['Structure',sh.structure],['Weapons',sh.weapons]];
  var DEPT=[['Command',sh.command],['Conn',sh.conn],['Security',sh.security],['Engineering',sh.engineering],['Science',sh.science],['Medicine',sh.medicine]];
  setHTML('h-ship-sys',SYS.map(function(a){
    var v=a[1]||0,pct=Math.min(100,Math.round(v/12*100));
    return '<div class="attr-item"><span class="an">'+a[0]+'</span><div class="ab"><div class="ab-fill" style="width:'+pct+'%;background:#99CCFF"></div></div><span class="av" style="color:#99CCFF">'+(v||'\u2014')+'</span></div>';
  }).join(''));
  setHTML('h-ship-dept',DEPT.map(function(a){
    var v=a[1]||0,dots='';
    for(var i=1;i<=5;i++)dots+='<div class="ddot'+(i<=v?' on':'')+'"></div>';
    return '<div class="disc-item-v"><span class="dn">'+a[0]+'</span><div class="dd">'+dots+'</div></div>';
  }).join(''));

  // Sector map
  var sm=d.sectorMap||{};
  setText('h-sector-name',(sm.name||'Sector')+' \u2014 Map');
  var smCells=sm.cells||[];
  var smCur=sm.currentCell!=null?sm.currentCell:12;
  setHTML('h-smap',smCells.map(function(cell,idx){
    var cls='scell'+(cell.isVoid?' void':'')+(idx===smCur?' cur':'');
    var icon=cell.icon||(idx===smCur?'\uD83D\uDE80':'\u00b7');
    var nameEl=cell.name?'<div class="scell-name">'+cell.name+'</div>':'';
    return '<div class="'+cls+'">'+icon+nameEl+'</div>';
  }).join(''));

  // Interior map
  var im=d.interiorMap||{};
  var imCells=im.cells||[];
  setText('h-interior-name',(sh.name||'Ship')+' Interior');
  setHTML('h-imap',imCells.map(function(cell){
    var cls='icell'+(cell.isVoid?' void':'');
    var icon=cell.icon||'';
    var nameEl=cell.name?'<div class="icell-name">'+cell.name+'</div>':'';
    return '<div class="'+cls+'">'+(icon||(!cell.isVoid?'\u00b7':''))+nameEl+'</div>';
  }).join(''));

  // Dice
  var dice=d.dice;
  if(dice&&dice.rolls){
    var dHTML=dice.rolls.map(function(r){
      var cls=r===1?'crit':r===20?'comp':(r<=dice.tn?'suc':'fail');
      return '<div class="die-box '+cls+'">'+r+'</div>';
    }).join('');
    var oc=dice.success?(dice.label==='Opposition'?'#FF4422':'#66CC66'):(dice.label==='Opposition'?'#66CC66':'#FF4422');
    var ot=dice.label==='Opposition'?(dice.success?'OPPOSITION SUCCEEDS':'OPPOSITION FAILS'):(dice.success?'SUCCESS':'FAILURE');
    dHTML+='<div style="font-size:11px;font-weight:700;color:'+oc+';width:100%;margin-top:4px;text-transform:uppercase;letter-spacing:1px">'+ot+'</div>';
    setHTML('h-dice-row',dHTML);
    setHTML('h-dice-info',(dice.label?dice.label+' \u00b7 ':'')+'TN: '+dice.tn+' | '+dice.successes+' success'+(dice.successes!==1?'es':'')+(dice.complications?' | '+dice.complications+' complication':''));
  }

  // Log
  var log=d.log||[];
  setHTML('h-log-content',log.length?log.map(function(e){
    return '<div class="log-entry"><div class="log-title">'+(e.title||e.type||'Log')+'</div><div class="log-date">'+(e.date||'')+'</div>'+(e.body?'<div class="log-body">'+e.body.slice(0,140)+'</div>':'')+'</div>';
  }).join(''):'<span class="sml">No entries</span>');

  // Encounter — always shows combat enemies with stress dots
  var enc=d.encounter||[];
  setHTML('h-enc-content',enc.length?enc.map(function(e){
    var dots=(e.stress||[]).map(function(s){return '<div class="sdot'+(s?' hit':'')+'"></div>';}).join('');
    return '<div class="enc-row"><div class="enc-name">'+(e.name||'Unknown')+'</div><div class="stress-dots">'+dots+'</div></div>';
  }).join(''):'<span class="sml">No active encounter</span>');
}

function show(id,v){var el=document.getElementById(id);if(el)el.style.display=v?'':'none';}
function setText(id,v){var el=document.getElementById(id);if(el)el.textContent=v||'';}
function setHTML(id,v){var el=document.getElementById(id);if(el)el.innerHTML=v||'';}

// === Background selector ===
function selectBg(el){
  document.querySelectorAll('.bg-opt').forEach(function(x){x.classList.remove('selected');});
  el.classList.add('selected');
  _bgType=el.dataset.type||'none';
  _bgSrc=el.dataset.src?BG_BASE+el.dataset.src:'';
  var sc=document.getElementById('seg-controls');
  if(sc)sc.style.display=_bgType!=='none'?'':'none';
  applyPreviewEffect();
}

// === Camera helpers ===
async function startCamera(hd){
  // For standard preview, prefer the stream the main app already acquired
  if(!hd){var op=getOpenerStream();if(op)return op;}
  var cid=document.getElementById('cam-sel')?document.getElementById('cam-sel').value:'';
  var mid=document.getElementById('mic-sel')?document.getElementById('mic-sel').value:'';
  var vidCon=hd?{width:{ideal:1920},height:{ideal:1080},frameRate:{ideal:30}}:{width:{ideal:1280},height:{ideal:720},frameRate:{ideal:30}};
  if(cid)vidCon.deviceId={ideal:cid};
  var audCon=mid?{deviceId:{ideal:mid}}:true;
  // Progressive fallback: preferred audio → any audio → video-only → any video-only
  var tries=[{video:vidCon,audio:audCon},{video:vidCon,audio:true},{video:vidCon,audio:false},{video:true,audio:false}];
  for(var i=0;i<tries.length;i++){try{return await navigator.mediaDevices.getUserMedia(tries[i]);}catch(e){if(i===tries.length-1)throw e;}}
}

// Setup-screen preview only — simple CSS hint so the user can see their choice
function applyBgCss(vidEl,wrapEl){
  if(!vidEl||!wrapEl)return;
  vidEl.style.filter='';
  wrapEl.style.backgroundImage='';wrapEl.style.backgroundSize='';wrapEl.style.backgroundPosition='';
  if(_bgType==='blur'){
    vidEl.style.filter='blur(10px)';
  }else if(_bgType==='image'&&_bgSrc){
    wrapEl.style.backgroundImage='url('+_bgSrc+')';
    wrapEl.style.backgroundSize='cover';wrapEl.style.backgroundPosition='center';
  }
}

async function applyCameraStream(stream){
  if(_bgEffect){_bgEffect.stopEffect();_bgEffect=null;}
  _bgDisplayStream=stream;
  var vid=document.getElementById('webcam-video');
  var noSig=document.getElementById('no-signal');
  if(vid)vid.srcObject=stream;
  if(_bgType!=='none'){
    if(noSig)noSig.textContent='Loading segmentation\u2026';
    try{
      _bgEffect=new VirtualBgEffect(_bgType,_bgSrc||null,20);
      var out=await _bgEffect.startEffect(stream);
      stream.getAudioTracks().forEach(function(t){out.addTrack(t);});
      _bgDisplayStream=out;
      if(vid)vid.srcObject=out;
      if(noSig)noSig.textContent='';
    }catch(e){
      if(noSig){noSig.textContent='Segmentation failed — showing raw feed';setTimeout(function(){noSig.textContent='';},4000);}
    }
  }
}

// === Recording ===
function toggleRec(){if(!_rec)startRec();else stopRec();}

function startRec(){
  var prevStream=_stream;
  var upgradePromise=_stream
    ?startCamera(true).then(function(s){_hdStream=s;return applyCameraStream(s);}).catch(function(){})
    :Promise.resolve();
  upgradePromise.then(function(){
    return navigator.mediaDevices.getDisplayMedia({video:{width:{ideal:1920},height:{ideal:1080},frameRate:{ideal:30}},audio:false});
  }).then(function(screenStream){
    _chunks=[];_secs=0;
    var tracks=screenStream.getVideoTracks().slice();
    var audioSrc=_bgDisplayStream||_hdStream||_stream;
    if(audioSrc){var at=audioSrc.getAudioTracks();if(at.length)tracks.push(at[0]);}
    var recStream=new MediaStream(tracks);
    tracks[0].onended=stopRec;
    var mime=['video/mp4;codecs=avc1,mp4a.40.2','video/mp4;codecs=avc1,opus','video/mp4','video/webm;codecs=vp9,opus','video/webm;codecs=h264','video/webm']
      .find(function(m){try{return MediaRecorder.isTypeSupported(m);}catch(e){return false;}})||'';
    try{_rec=new MediaRecorder(recStream,Object.assign(mime?{mimeType:mime}:{},{videoBitsPerSecond:8000000,audioBitsPerSecond:256000}));}
    catch(e){_rec=new MediaRecorder(recStream,mime?{mimeType:mime}:{});}
    _rec.ondataavailable=function(e){if(e.data&&e.data.size>0)_chunks.push(e.data);};
    _rec.onstop=function(){screenStream.getTracks().forEach(function(t){t.stop();});saveRec();};
    _rec.start(100);
    var btn=document.getElementById('rec-btn');if(btn){btn.textContent='\u23F9 STOP';btn.classList.add('rec-on');}
    _timer=setInterval(function(){_secs++;var mm=String(Math.floor(_secs/60)).padStart(2,'0'),ss=String(_secs%60).padStart(2,'0');var t=document.getElementById('rec-timer');if(t)t.textContent=mm+':'+ss;},1000);
  }).catch(function(){
    if(_hdStream){_hdStream.getTracks().forEach(function(t){t.stop();});_hdStream=null;}
    if(prevStream)applyCameraStream(prevStream);
  });
}

function stopRec(){
  if(_rec&&_rec.state!=='inactive')_rec.stop();
  clearInterval(_timer);_rec=null;
  var btn=document.getElementById('rec-btn');if(btn){btn.textContent='\u25CF REC SCREEN';btn.classList.remove('rec-on');}
  var t=document.getElementById('rec-timer');if(t)t.textContent='';
  if(_hdStream){
    if(_bgEffect){_bgEffect.stopEffect();_bgEffect=null;}
    if(_hdStream!==getOpenerStream())_hdStream.getTracks().forEach(function(t){t.stop();});
    _hdStream=null;
    if(_stream)applyCameraStream(_stream);
  }
}

function saveRec(){
  var mime=(_chunks[0]&&_chunks[0].type)||'video/webm';
  var ext=mime.indexOf('mp4')>-1?'mp4':'webm';
  var blob=new Blob(_chunks,{type:mime});
  var url=URL.createObjectURL(blob),a=document.createElement('a');
  a.href=url;a.download='captainslog-'+new Date().toISOString().slice(0,19).replace(/[T:]/g,'-')+'.'+ext;
  a.click();setTimeout(function(){URL.revokeObjectURL(url);},4000);
}

// === Device enumeration, setup preview & HUD start ===
// Camera stream is pre-acquired by the main app window and shared here
// via window.opener._hudCamStream to avoid popup permission issues.

function getOpenerStream(){return window.opener&&window.opener._hudCamStream||null;}

async function startSetupPreview(){
  var noSig=document.getElementById('setup-no-cam');
  var vid=document.getElementById('setup-preview');
  var opStream=getOpenerStream();
  if(opStream){
    _previewStream=opStream;
  }else{
    var cid=document.getElementById('cam-sel')?document.getElementById('cam-sel').value:'';
    var resH=_camResH||720,resW=resH===480?640:resH===1080?1920:1280;
    var vidCon=cid?{deviceId:{ideal:cid},width:{ideal:resW},height:{ideal:resH}}:{width:{ideal:resW},height:{ideal:resH}};
    try{
      _previewStream=await navigator.mediaDevices.getUserMedia({video:vidCon,audio:false});
    }catch(e){
      // Resolution not supported — fall back to 720p
      if(resH!==720){
        _camResH=720;
        var resSel=document.getElementById('res-sel');if(resSel)resSel.value='720';
        if(noSig){noSig.style.display='';noSig.textContent=resH+'p not supported\u2014trying 720p\u2026';}
        try{
          var fbCon=cid?{deviceId:{ideal:cid},width:{ideal:1280},height:{ideal:720}}:{width:{ideal:1280},height:{ideal:720}};
          _previewStream=await navigator.mediaDevices.getUserMedia({video:fbCon,audio:false});
        }catch(e2){if(noSig)noSig.style.display='';return;}
      }else{if(noSig)noSig.style.display='';return;}
    }
  }
  if(vid&&_previewStream){vid.srcObject=_previewStream;if(noSig)noSig.style.display='none';}
  await applyPreviewEffect();
}

async function applyPreviewEffect(){
  if(_previewEffect){_previewEffect.stopEffect();_previewEffect=null;}
  var vid=document.getElementById('setup-preview');
  var noSig=document.getElementById('setup-no-cam');
  if(!_previewStream||!vid)return;
  vid.srcObject=_previewStream; // show raw while loading
  if(_bgType==='none')return;
  if(noSig){noSig.style.display='';noSig.textContent='Loading\u2026';}
  try{
    _previewEffect=new VirtualBgEffect(_bgType,_bgSrc||null,20);
    var out=await _previewEffect.startEffect(_previewStream);
    if(vid)vid.srcObject=out;
    if(noSig)noSig.style.display='none';
  }catch(e){
    if(noSig){noSig.style.display='';noSig.textContent='Effect unavailable';}
  }
}

function onThreshChange(v){
  _segThreshold=+v;
  var el=document.getElementById('thresh-val');if(el)el.textContent=v;
}
function onFeatherChange(v){
  _segFeather=+v;
  var el=document.getElementById('feather-val');if(el)el.textContent=v+'px';
}
function onModelChange(){
  var sel=document.getElementById('model-sel');
  _segModelSel=sel?+sel.value:1;
  VirtualBgEffect.resetSegmenter();
  applyPreviewEffect();
}
function onResChange(){
  var sel=document.getElementById('res-sel');
  _camResH=sel?+sel.value:720;
  if(_previewEffect){_previewEffect.stopEffect();_previewEffect=null;}
  // Never stop the opener's stream — it belongs to the main app
  if(_previewStream&&_previewStream!==getOpenerStream()){
    _previewStream.getTracks().forEach(function(t){t.stop()});
  }
  _previewStream=null;
  // Ask the main app to re-acquire the camera at the new resolution
  if(window.opener&&window.opener.reacquireCamStream){
    var noSig=document.getElementById('setup-no-cam');
    if(noSig){noSig.style.display='';noSig.textContent='Switching resolution\u2026';}
    window.opener.reacquireCamStream(_camResH).then(function(){
      startSetupPreview();
    });
  }else{
    startSetupPreview();
  }
}

async function enumDevs(){
  // Prefer enumerating from the opener window (already has permissions + labels)
  var devs=null;
  try{
    if(window.opener&&window.opener.navigator&&window.opener.navigator.mediaDevices){
      devs=await window.opener.navigator.mediaDevices.enumerateDevices();
    }
  }catch(e){}
  if(!devs){
    try{
      await navigator.mediaDevices.getUserMedia({video:true,audio:true})
        .then(function(s){s.getTracks().forEach(function(t){t.stop();});}).catch(function(){});
      devs=await navigator.mediaDevices.enumerateDevices();
    }catch(e){devs=[];}
  }
  var cs=document.getElementById('cam-sel'),ms=document.getElementById('mic-sel');
  (devs||[]).forEach(function(d){
    var o=document.createElement('option');o.value=d.deviceId;
    if(d.kind==='videoinput'){o.textContent=d.label||'Camera '+cs.options.length;cs.appendChild(o);}
    else if(d.kind==='audioinput'){o.textContent=d.label||'Mic '+ms.options.length;ms.appendChild(o);}
  });
  if(cs.options.length>1||getOpenerStream())startSetupPreview();
}

async function startHUD(cam){
  document.getElementById('setup').style.display='none';
  if(cam){
    try{
      var opStream=getOpenerStream();
      _stream=opStream||await startCamera(false);
      if(_previewEffect){
        // Promote the already-running preview effect to the main HUD — no restart needed
        _bgEffect=_previewEffect;_previewEffect=null;
        _bgDisplayStream=_bgEffect._outStream||_stream;
        var vid=document.getElementById('webcam-video');
        if(vid)vid.srcObject=_bgDisplayStream;
      }else{
        await applyCameraStream(_stream);
      }
    }catch(e){document.getElementById('no-signal').textContent='Camera unavailable';}
  }
  document.getElementById('rec-btn').style.display='';
}
enumDevs();

// === VirtualBgEffect (MediaPipe SelfieSegmentation) ===
var MEDIAPIPE_CDN='https://cdn.jsdelivr.net/npm/@mediapipe/selfie_segmentation@0.1/';
function loadScript(src){
  return new Promise(function(resolve,reject){
    var s=document.createElement('script');s.src=src;
    s.onload=resolve;s.onerror=function(){reject(new Error('Failed to load: '+src));};
    document.head.appendChild(s);
  });
}
var VirtualBgEffect=(function(){
  var _segPromise=null;
  function VirtualBgEffect(type,imageSrc,blurRadius){
    this.type=type;this.imageSrc=imageSrc;this.blurRadius=blurRadius||20;
    this._running=false;this._seg=null;this._video=null;this._canvas=null;
    this._ctx=null;this._bgImg=null;this._outStream=null;this._rafId=null;
    this._tmpCanvas=null;this._tmpCtx=null;
  }
  VirtualBgEffect._getSegmenter=function(){if(!_segPromise)_segPromise=VirtualBgEffect._load();return _segPromise;};
  VirtualBgEffect.resetSegmenter=function(){_segPromise=null;};
  VirtualBgEffect._load=function(){
    return loadScript(MEDIAPIPE_CDN+'selfie_segmentation.js').then(function(){
      if(!window.SelfieSegmentation)throw new Error('SelfieSegmentation not available');
      var modelSel=(window._segModelSel!==undefined?+window._segModelSel:1);
      var seg=new window.SelfieSegmentation({locateFile:function(f){return MEDIAPIPE_CDN+f;}});
      seg.setOptions({modelSelection:modelSel});
      seg.onResults(function(){});
      return seg.initialize().then(function(){return seg;});
    });
  };
  VirtualBgEffect.prototype.startEffect=function(stream){
    var self=this;
    return VirtualBgEffect._getSegmenter().then(function(seg){
      self._seg=seg;
      var imgLoad=Promise.resolve();
      if(self.type==='image'&&self.imageSrc){
        imgLoad=new Promise(function(resolve,reject){
          var img=new Image();
          img.crossOrigin='anonymous';
          img.onload=function(){self._bgImg=img;resolve();};
          img.onerror=reject;img.src=self.imageSrc;
        });
      }
      return imgLoad.then(function(){
        var video=document.createElement('video');
        video.srcObject=stream;video.muted=true;video.autoplay=true;video.playsInline=true;
        return new Promise(function(resolve){video.onloadedmetadata=resolve;setTimeout(resolve,2000);})
        .then(function(){return video.play().catch(function(){});})
        .then(function(){
          var W=video.videoWidth||1280,H=video.videoHeight||720;
          var canvas=document.createElement('canvas');canvas.width=W;canvas.height=H;
          self._video=video;self._canvas=canvas;self._ctx=canvas.getContext('2d');
          self._running=true;
          seg.onResults(function(r){self._onResults(r);});
          self._scheduleFrame();
          self._outStream=canvas.captureStream(30);
          return self._outStream;
        });
      });
    });
  };
  VirtualBgEffect.prototype._onResults=function(results){
    if(!this._running||!this._ctx)return;
    var ctx=this._ctx,W=this._canvas.width,H=this._canvas.height;
    ctx.clearRect(0,0,W,H);
    // Draw background layer
    if(this.type==='blur'){
      ctx.filter='blur('+this.blurRadius+'px)';
      ctx.drawImage(results.image,-this.blurRadius*2,-this.blurRadius*2,W+this.blurRadius*4,H+this.blurRadius*4);
      ctx.filter='none';
    }else if(this.type==='image'&&this._bgImg){
      var s=Math.max(W/this._bgImg.naturalWidth,H/this._bgImg.naturalHeight);
      var sw=this._bgImg.naturalWidth*s,sh=this._bgImg.naturalHeight*s;
      ctx.drawImage(this._bgImg,(W-sw)/2,(H-sh)/2,sw,sh);
    }else{
      ctx.drawImage(results.image,0,0,W,H);
    }
    // Build masked foreground:
    // The mask has opaque white (person) and opaque black (background) — both alpha=1.
    // source-in only tests alpha so it can't distinguish them. Instead, copy mask
    // brightness into the video frame's alpha channel via pixel manipulation.
    if(!this._tmpCanvas){
      this._tmpCanvas=document.createElement('canvas');
      this._tmpCanvas.width=W;this._tmpCanvas.height=H;
      this._tmpCtx=this._tmpCanvas.getContext('2d',{willReadFrequently:true});
    }
    // Blur the mask before reading to create soft feathered edges
    var featherPx=+(window._segFeather!==undefined?window._segFeather:4);
    if(featherPx>0)this._tmpCtx.filter='blur('+featherPx+'px)';
    this._tmpCtx.drawImage(results.segmentationMask,0,0,W,H);
    if(featherPx>0)this._tmpCtx.filter='none';
    var maskPx=this._tmpCtx.getImageData(0,0,W,H).data;
    this._tmpCtx.drawImage(results.image,0,0,W,H);
    var imgD=this._tmpCtx.getImageData(0,0,W,H);
    var d=imgD.data;
    // Apply threshold curve: ramp from (thr-half)→0 to (thr+half)→255
    var thr=+(window._segThreshold!==undefined?window._segThreshold:140);
    var half=Math.max(1,featherPx*8);
    var lo=thr-half,range=(half*2)||1;
    for(var i=0;i<d.length;i+=4){
      var v=maskPx[i];
      d[i+3]=v<=lo?0:v>=(lo+range)?255:Math.round((v-lo)/range*255);
    }
    this._tmpCtx.putImageData(imgD,0,0);
    ctx.drawImage(this._tmpCanvas,0,0);
  };
  VirtualBgEffect.prototype._scheduleFrame=function(){
    var self=this;if(!self._running||!self._seg||!self._video)return;
    self._rafId=requestAnimationFrame(function(){
      self._seg.send({image:self._video}).catch(function(){}).finally(function(){self._scheduleFrame();});
    });
  };
  VirtualBgEffect.prototype.stopEffect=function(){
    this._running=false;
    if(this._rafId)cancelAnimationFrame(this._rafId);
    if(this._video){this._video.srcObject=null;this._video=null;}
    if(this._outStream){this._outStream.getTracks().forEach(function(t){t.stop();});this._outStream=null;}
  };
  return VirtualBgEffect;
})();

<\/script></body></html>`;
